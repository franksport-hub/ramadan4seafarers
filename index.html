<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#064e3b">
    <title>Nautische Reflectie Gids</title>

    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="manifest.json">
    <!-- Zorg dat je een icon-192.png afbeelding (192x192 pixels) in je GitHub map hebt staan voor Apple apparaten -->
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Tailwind CSS voor de opmaak -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel voor de logica -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-stone-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Handmatige SVG Iconen (Omdat we geen losse bestanden hebben) ---
        const Icon = ({ children, size = 24, className = "", ...rest }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...rest}>
                {children}
            </svg>
        );
        const Sun = (p) => <Icon {...p}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></Icon>;
        const Moon = (p) => <Icon {...p}><path d="M12 3a6.364 6.364 0 0 0 9 9 9 9 0 1 1-9-9Z"/></Icon>;
        const BookOpen = (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
        const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></Icon>;
        const Send = (p) => <Icon {...p}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></Icon>;
        const Navigation = (p) => <Icon {...p}><polygon points="3 11 22 2 13 21 11 13 3 11"/></Icon>;
        const MapPin = (p) => <Icon {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;
        const Anchor = (p) => <Icon {...p}><circle cx="12" cy="5" r="3"/><line x1="12" x2="12" y1="8" y2="22"/><line x1="5" x2="19" y1="12" y2="12"/><path d="M5 12c0 3.866 3.134 7 7 7s7-3.134 7-7"/></Icon>;
        const Loader2 = (p) => <Icon {...p}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Icon>;
        const Globe = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></Icon>;
        const Trash2 = (p) => <Icon {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></Icon>;
        const Sparkles = (p) => <Icon {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></Icon>;

        // --- Woordenboek ---
        const translations = {
            nl: {
                title: "Nautische Reflectie Gids",
                subtitle: "Nauwkeurige tijden op zee, berekend op jouw coördinaten.",
                navTitle: "Positie & Berekening",
                navDesc: "Gebruik GPS of voer handmatig de verwachte positie in voor de volgende vastendag.",
                btnGPS: "Huidige GPS",
                btnCalc: "Bereken Tijden",
                fajr: "Fajr (Dageraad)",
                dhuhr: "Dhuhr (Middag)",
                asr: "Asr (Namiddag)",
                maghrib: "Maghrib (Iftar)",
                isha: "Isha (Nacht)",
                timeTillFajr: "Tijd tot Fajr",
                timeTillIftar: "Tijd tot Iftar",
                fastTitleFallback: "Vasten Ritme",
                waitingForLoc: "Bereken een locatie om de timer te starten...",
                waitingFajr: "In afwachting van Fajr.",
                waitingIftar: "Aan het vasten tot Iftar.",
                refTitle: "Notities & Intenties",
                refPlaceholder: "Schrijf hier je intentie (Niyyah), gedachten of gebeden...",
                entriesTitle: "Opgeslagen Notities",
                msgSuccess: "Tijden berekend op basis van astronomische schemering.",
                msgErrorCalc: "Kon de tijden niet berekenen.",
                msgNetError: "Netwerkfout bij het ophalen.",
                msgGPSLocating: "GPS zoeken...",
                msgGPSFail: "GPS faalde. Voer handmatig in.",
                msgGPSNoSupport: "GPS niet ondersteund.",
                msgManualFillAll: "Vul alle graden en minuten in.",
                btnClear: "Wis",
                copyright: "© 2026 Gemaakt voor Zeevarenden",
                btnPrompt: "Suggestie"
            },
            en: {
                title: "Nautical Reflection Guide",
                subtitle: "Accurate times at sea, calculated from your coordinates.",
                navTitle: "Position & Calculation",
                navDesc: "Use GPS or manually enter expected position for the next fasting day.",
                btnGPS: "Current GPS",
                btnCalc: "Calculate Times",
                fajr: "Fajr (Dawn)",
                dhuhr: "Dhuhr (Noon)",
                asr: "Asr (Afternoon)",
                maghrib: "Maghrib (Iftar)",
                isha: "Isha (Night)",
                timeTillFajr: "Time till Fajr",
                timeTillIftar: "Time till Iftar",
                fastTitleFallback: "Fasting Rhythm",
                waitingForLoc: "Calculate a location to start timer...",
                waitingFajr: "Awaiting Fajr.",
                waitingIftar: "Fasting until Iftar.",
                refTitle: "Notes & Intentions",
                refPlaceholder: "Write your intention (Niyyah), thoughts or prayers here...",
                entriesTitle: "Saved Notes",
                msgSuccess: "Times calculated based on astronomical twilight.",
                msgErrorCalc: "Could not calculate times.",
                msgNetError: "Network error during fetch.",
                msgGPSLocating: "Locating GPS...",
                msgGPSFail: "GPS failed. Enter manually.",
                msgGPSNoSupport: "GPS not supported.",
                msgManualFillAll: "Fill all degrees and minutes.",
                btnClear: "Clear",
                copyright: "© 2026 Made for Seafarers",
                btnPrompt: "Suggestion"
            }
        };

        const humanistPrompts = {
            nl: [
                "Waar ben ik vandaag het meest dankbaar voor te midden van deze uitgestrekte oceaan?",
                "Welke oprechte intentie (Niyyah) zet ik voor deze dag?",
                "De zee is uitgestrekt en geduldig. Hoe kan ik vandaag zelf geduld oefenen?",
                "Een moment van stilte voor de mensen thuis. Wat wens ik ze toe?",
                "Zoals de golven komen en gaan, zo komen ook gedachten. Welke gedachte mag ik vandaag loslaten?",
                "Wat is mijn persoonlijke kompas of drijfveer vandaag?",
                "In de stilte van de nachtwacht vind ik rust. Wat leert deze stilte mij?",
                "Welke kleine daad van vriendelijkheid kan ik vandaag voor de bemanning doen?"
            ],
            en: [
                "What am I most grateful for today amidst this vast ocean?",
                "What sincere intention (Niyyah) am I setting for this day?",
                "The sea is vast and patient. How can I practice patience today?",
                "A moment of silence for loved ones at home. What do I wish for them?",
                "Just as waves come and go, so do thoughts. Which thought can I let go of today?",
                "What is my personal compass or motivation today?",
                "In the quiet of the night watch, I find peace. What does this silence teach me?",
                "What small act of kindness can I do for my crew today?"
            ]
        };

        function App() {
            const getDeviceLang = () => {
                const lang = navigator.language || 'en';
                return lang.toLowerCase().startsWith('nl') ? 'nl' : 'en';
            };
            
            const [lang, setLang] = useState(() => localStorage.getItem('appLang') || getDeviceLang());
            const t = translations[lang];

            const [journalText, setJournalText] = useState('');
            const [entries, setEntries] = useState(() => {
                const saved = localStorage.getItem('ramadanEntries');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => {
                localStorage.setItem('appLang', lang);
            }, [lang]);

            useEffect(() => {
                localStorage.setItem('ramadanEntries', JSON.stringify(entries));
            }, [entries]);

            const [solarDates, setSolarDates] = useState(null);
            const [countdown, setCountdown] = useState('--:--:--');
            const [nextEvent, setNextEvent] = useState('');

            const [latDeg, setLatDeg] = useState(() => localStorage.getItem('latDeg') || '');
            const [latMin, setLatMin] = useState(() => localStorage.getItem('latMin') || '');
            const [latDir, setLatDir] = useState(() => localStorage.getItem('latDir') || 'N');
            
            const [lngDeg, setLngDeg] = useState(() => localStorage.getItem('lngDeg') || '');
            const [lngMin, setLngMin] = useState(() => localStorage.getItem('lngMin') || '');
            const [lngDir, setLngDir] = useState(() => localStorage.getItem('lngDir') || 'E');

            const [solarTimes, setSolarTimes] = useState(null);
            const [isLoadingLocation, setIsLoadingLocation] = useState(false);
            const [locationMessage, setLocationMessage] = useState('');

            useEffect(() => {
                localStorage.setItem('latDeg', latDeg);
                localStorage.setItem('latMin', latMin);
                localStorage.setItem('latDir', latDir);
                localStorage.setItem('lngDeg', lngDeg);
                localStorage.setItem('lngMin', lngMin);
                localStorage.setItem('lngDir', lngDir);
            }, [latDeg, latMin, latDir, lngDeg, lngMin, lngDir]);

            useEffect(() => {
                if (latDeg !== '' && lngDeg !== '') {
                    handleManualCalculate();
                }
            }, []);

            useEffect(() => {
                let interval;
                if (solarDates) {
                    const updateTimer = () => {
                        const now = new Date();
                        let target;
                        let eventName;

                        if (now < solarDates.fajr) {
                            target = solarDates.fajr;
                            eventName = 'Fajr';
                        } else if (now >= solarDates.fajr && now < solarDates.iftar) {
                            target = solarDates.iftar;
                            eventName = 'Iftar';
                        } else {
                            target = new Date(solarDates.fajr.getTime() + 24 * 60 * 60 * 1000);
                            eventName = 'Fajr';
                        }

                        const diff = target - now;
                        if (diff <= 0) {
                            setCountdown('00:00:00');
                            return;
                        }

                        const h = Math.floor(diff / (1000 * 60 * 60));
                        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const s = Math.floor((diff % (1000 * 60)) / 1000);

                        setCountdown(
                            `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`
                        );
                        setNextEvent(eventName);
                    };

                    updateTimer(); 
                    interval = setInterval(updateTimer, 1000);
                } else {
                    setCountdown('--:--:--');
                    setNextEvent('');
                }
                return () => clearInterval(interval);
            }, [solarDates]);

            const handleSaveJournal = () => {
                if (journalText.trim() === '') return;
                const deviceLocale = navigator.language || 'en-US';
                const newEntry = {
                    id: Date.now(),
                    text: journalText,
                    date: new Date().toLocaleDateString(deviceLocale, { day: 'numeric', month: 'short' }),
                    time: new Date().toLocaleTimeString(deviceLocale, { hour: '2-digit', minute: '2-digit' })
                };
                setEntries([newEntry, ...entries]);
                setJournalText('');
            };

            const handleDeleteEntry = (id) => {
                setEntries(entries.filter(entry => entry.id !== id));
            };

            const generateRandomPrompt = () => {
                const promptList = humanistPrompts[lang];
                const randomPrompt = promptList[Math.floor(Math.random() * promptList.length)];
                setJournalText(prev => prev ? prev + '\n\n' + randomPrompt : randomPrompt);
            };

            const fetchSolarTimes = async (latitude, longitude) => {
                setIsLoadingLocation(true);
                setLocationMessage('');
                try {
                    const response = await fetch(`https://api.sunrise-sunset.org/json?lat=${latitude}&lng=${longitude}&formatted=0`);
                    const data = await response.json();
                    
                    if (data.status === 'OK') {
                        const dawn = new Date(data.results.astronomical_twilight_begin);
                        const dhuhr = new Date(data.results.solar_noon);
                        const sunset = new Date(data.results.sunset);
                        const isha = new Date(data.results.astronomical_twilight_end);
                        
                        const asrTimeMs = dhuhr.getTime() + (sunset.getTime() - dhuhr.getTime()) * 0.55;
                        const asr = new Date(asrTimeMs);

                        setSolarDates({ fajr: dawn, iftar: sunset });
                        
                        const deviceLocale = navigator.language || 'en-US';
                        const timeOpts = { hour: '2-digit', minute: '2-digit' };

                        setSolarTimes({
                            fajrLT: dawn.toLocaleTimeString(deviceLocale, timeOpts),
                            fajrUTC: dawn.toISOString().substring(11, 16),
                            dhuhrLT: dhuhr.toLocaleTimeString(deviceLocale, timeOpts),
                            dhuhrUTC: dhuhr.toISOString().substring(11, 16),
                            asrLT: asr.toLocaleTimeString(deviceLocale, timeOpts),
                            asrUTC: asr.toISOString().substring(11, 16),
                            maghribLT: sunset.toLocaleTimeString(deviceLocale, timeOpts),
                            maghribUTC: sunset.toISOString().substring(11, 16),
                            ishaLT: isha.toLocaleTimeString(deviceLocale, timeOpts),
                            ishaUTC: isha.toISOString().substring(11, 16)
                        });
                        setLocationMessage(t.msgSuccess);
                    } else {
                        setLocationMessage(t.msgErrorCalc);
                    }
                } catch (error) {
                    setLocationMessage(t.msgNetError);
                }
                setIsLoadingLocation(false);
            };

            const getGPSLocation = () => {
                if ("geolocation" in navigator) {
                    setIsLoadingLocation(true);
                    setLocationMessage(t.msgGPSLocating);
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const currentLat = position.coords.latitude;
                            const currentLng = position.coords.longitude;
                            
                            const isLatN = currentLat >= 0;
                            const absLat = Math.abs(currentLat);
                            setLatDeg(Math.floor(absLat).toString());
                            setLatMin(((absLat - Math.floor(absLat)) * 60).toFixed(2));
                            setLatDir(isLatN ? 'N' : 'S');

                            const isLngE = currentLng >= 0;
                            const absLng = Math.abs(currentLng);
                            setLngDeg(Math.floor(absLng).toString());
                            setLngMin(((absLng - Math.floor(absLng)) * 60).toFixed(2));
                            setLngDir(isLngE ? 'E' : 'W');

                            fetchSolarTimes(currentLat, currentLng);
                        },
                        (error) => {
                            setLocationMessage(t.msgGPSFail);
                            setIsLoadingLocation(false);
                        }
                    );
                } else {
                    setLocationMessage(t.msgGPSNoSupport);
                }
            };

            const handleManualCalculate = () => {
                if (latDeg !== '' && latMin !== '' && lngDeg !== '' && lngMin !== '') {
                    let calcLat = parseInt(latDeg) + (parseFloat(latMin) / 60);
                    if (latDir === 'S') calcLat = -calcLat;

                    let calcLng = parseInt(lngDeg) + (parseFloat(lngMin) / 60);
                    if (lngDir === 'W') calcLng = -calcLng;

                    fetchSolarTimes(calcLat, calcLng);
                } else {
                    setLocationMessage(t.msgManualFillAll);
                }
            };

            return (
                <div className="min-h-screen bg-stone-100 text-stone-800 font-sans pb-10">
                    <header className="bg-gradient-to-r from-emerald-800 to-teal-900 text-white p-6 shadow-md rounded-b-3xl relative">
                        <div className="absolute top-6 right-6">
                            <button onClick={() => setLang(lang === 'nl' ? 'en' : 'nl')} className="flex items-center gap-1 bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-full text-xs font-medium transition-colors border border-white/20">
                                <Globe size={14} />
                                {lang.toUpperCase()}
                            </button>
                        </div>
                        <div className="max-w-md mx-auto mt-2">
                            <h1 className="text-2xl font-semibold tracking-wide flex items-center gap-2">
                                <Anchor size={24} className="text-emerald-400" />
                                {t.title}
                            </h1>
                            <p className="text-stone-300 text-sm mt-1 font-light opacity-90">{t.subtitle}</p>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto px-4 mt-6 space-y-6">
                        <section className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <h2 className="text-lg font-medium text-stone-700 flex items-center gap-2 mb-3">
                                <Navigation size={20} className="text-emerald-700" />
                                {t.navTitle}
                            </h2>
                            <p className="text-sm text-stone-500 mb-5 leading-relaxed">{t.navDesc}</p>

                            <div className="space-y-3 mb-5">
                                <div className="flex flex-wrap items-center gap-2 bg-stone-50 p-2 rounded-lg border border-stone-200">
                                    <span className="text-xs font-semibold text-stone-500 w-8">LAT</span>
                                    <input type="number" min="0" max="90" value={latDeg} onChange={(e) => setLatDeg(e.target.value)} placeholder="00" className="w-16 p-2 text-sm rounded bg-white border border-stone-200 focus:ring-1 focus:ring-emerald-500 outline-none text-center font-mono" />
                                    <span className="text-stone-400 font-serif">°</span>
                                    <input type="number" min="0" max="60" step="0.01" value={latMin} onChange={(e) => setLatMin(e.target.value)} placeholder="00.00" className="w-20 p-2 text-sm rounded bg-white border border-stone-200 focus:ring-1 focus:ring-emerald-500 outline-none text-center font-mono" />
                                    <span className="text-stone-400 font-serif">'</span>
                                    <select value={latDir} onChange={(e) => setLatDir(e.target.value)} className="p-2 text-sm rounded bg-white border border-stone-200 focus:ring-1 focus:ring-emerald-500 outline-none font-bold text-stone-700">
                                        <option value="N">N</option>
                                        <option value="S">S</option>
                                    </select>
                                </div>

                                <div className="flex flex-wrap items-center gap-2 bg-stone-50 p-2 rounded-lg border border-stone-200">
                                    <span className="text-xs font-semibold text-stone-500 w-8">LNG</span>
                                    <input type="number" min="0" max="180" value={lngDeg} onChange={(e) => setLngDeg(e.target.value)} placeholder="000" className="w-16 p-2 text-sm rounded bg-white border border-stone-200 focus:ring-1 focus:ring-emerald-500 outline-none text-center font-mono" />
                                    <span className="text-stone-400 font-serif">°</span>
                                    <input type="number" min="0" max="60" step="0.01" value={lngMin} onChange={(e) => setLngMin(e.target.value)} placeholder="00.00" className="w-20 p-2 text-sm rounded bg-white border border-stone-200 focus:ring-1 focus:ring-emerald-500 outline-none text-center font-mono" />
                                    <span className="text-stone-400 font-serif">'</span>
                                    <select value={lngDir} onChange={(e) => setLngDir(e.target.value)} className="p-2 text-sm rounded bg-white border border-stone-200 focus:ring-1 focus:ring-emerald-500 outline-none font-bold text-stone-700">
                                        <option value="E">E</option>
                                        <option value="W">W</option>
                                    </select>
                                </div>
                            </div>

                            <div className="flex gap-3">
                                <button onClick={getGPSLocation} disabled={isLoadingLocation} className="flex-1 flex items-center justify-center gap-2 bg-stone-100 hover:bg-stone-200 text-stone-700 py-3 rounded-xl text-sm font-semibold transition-colors border border-stone-200 shadow-sm">
                                    <MapPin size={18} />
                                    {t.btnGPS}
                                </button>
                                <button onClick={handleManualCalculate} disabled={isLoadingLocation || (!latDeg && !lngDeg)} className="flex-1 flex items-center justify-center gap-2 bg-emerald-700 hover:bg-emerald-800 text-white py-3 rounded-xl text-sm font-semibold transition-colors shadow-md disabled:opacity-50">
                                    {isLoadingLocation ? <Loader2 size={18} className="animate-spin" /> : t.btnCalc}
                                </button>
                            </div>

                            {locationMessage && <p className="text-xs text-center mt-4 text-emerald-800 bg-emerald-50 p-2 rounded-lg">{locationMessage}</p>}

                            {solarTimes && (
                                <div className="mt-6 p-4 bg-stone-50 rounded-xl border border-stone-200 shadow-inner">
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                        <div className="text-center bg-white p-3 rounded-lg border border-stone-100 shadow-sm">
                                            <p className="text-[10px] font-bold text-stone-500 uppercase tracking-wider mb-1">{t.fajr}</p>
                                            <div className="flex items-center justify-center gap-1.5 text-stone-800 mb-1">
                                                <Sun size={14} className="text-emerald-600" />
                                                <span className="text-lg font-medium leading-none">{solarTimes.fajrLT}</span>
                                                <span className="text-[9px] text-stone-500 font-bold bg-stone-200 px-1 rounded">LT</span>
                                            </div>
                                            <span className="text-[10px] font-mono text-stone-400">{solarTimes.fajrUTC} UTC</span>
                                        </div>
                                        
                                        <div className="text-center bg-white p-3 rounded-lg border border-stone-100 shadow-sm">
                                            <p className="text-[10px] font-bold text-stone-500 uppercase tracking-wider mb-1">{t.dhuhr}</p>
                                            <div className="flex items-center justify-center gap-1.5 text-stone-800 mb-1">
                                                <Sun size={14} className="text-emerald-500" />
                                                <span className="text-lg font-medium leading-none">{solarTimes.dhuhrLT}</span>
                                                <span className="text-[9px] text-stone-500 font-bold bg-stone-200 px-1 rounded">LT</span>
                                            </div>
                                            <span className="text-[10px] font-mono text-stone-400">{solarTimes.dhuhrUTC} UTC</span>
                                        </div>

                                        <div className="text-center bg-white p-3 rounded-lg border border-stone-100 shadow-sm">
                                            <p className="text-[10px] font-bold text-stone-500 uppercase tracking-wider mb-1">{t.asr}</p>
                                            <div className="flex items-center justify-center gap-1.5 text-stone-800 mb-1">
                                                <Sun size={14} className="text-emerald-600 opacity-80" />
                                                <span className="text-lg font-medium leading-none">{solarTimes.asrLT}</span>
                                                <span className="text-[9px] text-stone-500 font-bold bg-stone-200 px-1 rounded">LT</span>
                                            </div>
                                            <span className="text-[10px] font-mono text-stone-400">{solarTimes.asrUTC} UTC</span>
                                        </div>

                                        <div className="text-center bg-white p-3 rounded-lg border border-stone-100 shadow-sm">
                                            <p className="text-[10px] font-bold text-stone-500 uppercase tracking-wider mb-1">{t.maghrib}</p>
                                            <div className="flex items-center justify-center gap-1.5 text-stone-800 mb-1">
                                                <Moon size={14} className="text-emerald-700" />
                                                <span className="text-lg font-medium leading-none">{solarTimes.maghribLT}</span>
                                                <span className="text-[9px] text-stone-500 font-bold bg-stone-200 px-1 rounded">LT</span>
                                            </div>
                                            <span className="text-[10px] font-mono text-stone-400">{solarTimes.maghribUTC} UTC</span>
                                        </div>

                                        <div className="text-center bg-white p-3 rounded-lg border border-stone-100 shadow-sm md:col-span-2">
                                            <p className="text-[10px] font-bold text-stone-500 uppercase tracking-wider mb-1">{t.isha}</p>
                                            <div className="flex items-center justify-center gap-1.5 text-stone-800 mb-1">
                                                <Moon size={14} className="text-emerald-900" />
                                                <span className="text-lg font-medium leading-none">{solarTimes.ishaLT}</span>
                                                <span className="text-[9px] text-stone-500 font-bold bg-stone-200 px-1 rounded">LT</span>
                                            </div>
                                            <span className="text-[10px] font-mono text-stone-400">{solarTimes.ishaUTC} UTC</span>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </section>

                        <section className={`p-6 rounded-2xl shadow-sm border relative overflow-hidden transition-colors duration-500 ${nextEvent === 'Iftar' ? 'bg-emerald-50 border-emerald-100' : 'bg-white border-stone-200'}`}>
                            <div className="absolute -top-4 -right-4 p-4 opacity-5 text-emerald-900 pointer-events-none">
                                {nextEvent === 'Iftar' ? <Sun size={140} /> : <Moon size={140} />}
                            </div>
                            
                            <h2 className="text-lg font-medium text-stone-700 flex items-center gap-2 mb-4 relative z-10">
                                <Clock size={20} className="text-emerald-700" />
                                {nextEvent === 'Fajr' ? t.timeTillFajr : (nextEvent === 'Iftar' ? t.timeTillIftar : t.fastTitleFallback)}
                            </h2>
                            
                            <div className="flex flex-col items-center py-6 relative z-10">
                                <p className="text-5xl font-light text-stone-800 mb-3 tracking-wider tabular-nums font-mono drop-shadow-sm">{countdown}</p>
                                <p className="text-sm font-medium text-emerald-800 text-center px-4 bg-emerald-100/50 py-1.5 px-3 rounded-full">
                                    {!solarDates ? t.waitingForLoc : (nextEvent === 'Fajr' ? t.waitingFajr : t.waitingIftar)}
                                </p>
                            </div>
                        </section>

                        <section className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-lg font-medium text-stone-700 flex items-center gap-2">
                                    <BookOpen size={20} className="text-emerald-700" />
                                    {t.refTitle}
                                </h2>
                                <button onClick={generateRandomPrompt} className="flex items-center gap-1.5 text-xs font-medium text-emerald-700 bg-emerald-50 hover:bg-emerald-100 px-3 py-1.5 rounded-full transition-colors border border-emerald-100">
                                    <Sparkles size={14} />
                                    {t.btnPrompt}
                                </button>
                            </div>
                            
                            <div className="relative">
                                <textarea
                                    value={journalText}
                                    onChange={(e) => setJournalText(e.target.value)}
                                    placeholder={t.refPlaceholder}
                                    className="w-full bg-stone-50 border border-stone-200 rounded-xl p-4 min-h-[100px] focus:outline-none focus:ring-2 focus:ring-emerald-500/50 resize-none text-stone-700 shadow-inner"
                                ></textarea>
                                <button onClick={handleSaveJournal} disabled={journalText.trim() === ''} className="absolute bottom-3 right-3 bg-emerald-700 text-white p-2.5 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-emerald-800 transition-colors shadow-md">
                                    <Send size={16} />
                                </button>
                            </div>
                        </section>

                        {entries.length > 0 && (
                            <section className="space-y-4">
                                <h3 className="text-sm font-bold text-stone-400 uppercase tracking-widest ml-1">{t.entriesTitle}</h3>
                                <div className="space-y-3">
                                    {entries.map(entry => (
                                        <div key={entry.id} className="bg-white p-4 rounded-xl shadow-sm border border-stone-200 group relative pr-12">
                                            <div className="flex justify-between items-center mb-1.5">
                                                <span className="text-xs font-bold text-emerald-700">{entry.date}</span>
                                                <span className="text-xs font-mono text-stone-400 bg-stone-100 px-1.5 py-0.5 rounded">{entry.time}</span>
                                            </div>
                                            <p className="text-stone-700 text-sm whitespace-pre-wrap leading-relaxed">{entry.text}</p>
                                            <button onClick={() => handleDeleteEntry(entry.id)} className="absolute top-1/2 -translate-y-1/2 right-3 p-2 text-stone-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" aria-label="Verwijder notitie">
                                                <Trash2 size={16} />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}

                        <footer className="text-center py-6 mt-8">
                            <p className="text-xs text-stone-400 font-medium">{t.copyright}</p>
                        </footer>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- Service Worker Registratie voor PWA (Offline & Installatie) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('ServiceWorker succesvol geregistreerd met scope: ', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registratie mislukt: ', error);
                    });
            });
        }
    </script>
</body>
</html>
