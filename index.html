<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#064e3b">
    <title>Nautische Reflectie Gids</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-stone-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ children, size = 24, className = "", ...rest }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...rest}>
                {children}
            </svg>
        );
        const Sun = (p) => <Icon {...p}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></Icon>;
        const Moon = (p) => <Icon {...p}><path d="M12 3a6.364 6.364 0 0 0 9 9 9 9 0 1 1-9-9Z"/></Icon>;
        const BookOpen = (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
        const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></Icon>;
        const Send = (p) => <Icon {...p}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></Icon>;
        const Navigation = (p) => <Icon {...p}><polygon points="3 11 22 2 13 21 11 13 3 11"/></Icon>;
        const MapPin = (p) => <Icon {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;
        const Anchor = (p) => <Icon {...p}><circle cx="12" cy="5" r="3"/><line x1="12" x2="12" y1="8" y2="22"/><line x1="5" x2="19" y1="12" y2="12"/><path d="M5 12c0 3.866 3.134 7 7 7s7-3.134 7-7"/></Icon>;
        const Loader2 = (p) => <Icon {...p}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Icon>;
        const Globe = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></Icon>;
        const Trash2 = (p) => <Icon {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></Icon>;
        const Sparkles = (p) => <Icon {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></Icon>;

        const translations = {
            nl: {
                title: "Nautische Reflectie Gids",
                subtitle: "Nauwkeurige tijden op zee, berekend op jouw coördinaten.",
                navTitle: "Positie & Berekening",
                navDesc: "Gebruik GPS of voer handmatig de verwachte positie in voor de volgende vastendag.",
                btnGPS: "Huidige GPS",
                btnCalc: "Bereken Tijden",
                timeTillFajr: "Tijd tot Fajr",
                timeTillIftar: "Tijd tot Iftar",
                fastTitleFallback: "Vasten Ritme",
                waitingForLoc: "Bereken een locatie om de timer te starten...",
                waitingFajr: "In afwachting van Fajr.",
                waitingIftar: "Aan het vasten tot Iftar.",
                refTitle: "Notities & Intenties",
                refPlaceholder: "Schrijf hier je intentie (Niyyah), gedachten of gebeden...",
                entriesTitle: "Opgeslagen Notities",
                msgSuccess: "Tijden berekend via Islamitische methode (15°).",
                msgErrorCalc: "Kon de tijden niet berekenen.",
                msgNetError: "Netwerkfout bij het ophalen.",
                msgGPSLocating: "GPS zoeken...",
                msgGPSFail: "GPS faalde. Voer handmatig in.",
                msgGPSNoSupport: "GPS niet ondersteund.",
                msgManualFillAll: "Vul alle graden en minuten in.",
                copyright: "© 2026 Gemaakt voor Zeevarenden",
                btnPrompt: "Suggestie"
            },
            en: {
                title: "Nautical Reflection Guide",
                subtitle: "Accurate times at sea, calculated from your coordinates.",
                navTitle: "Position & Calculation",
                navDesc: "Use GPS or manually enter expected position for the next fasting day.",
                btnGPS: "Current GPS",
                btnCalc: "Calculate Times",
                timeTillFajr: "Time till Fajr",
                timeTillIftar: "Time till Iftar",
                fastTitleFallback: "Fasting Rhythm",
                waitingForLoc: "Calculate a location to start timer...",
                waitingFajr: "Awaiting Fajr.",
                waitingIftar: "Fasting until Iftar.",
                refTitle: "Notes & Intentions",
                refPlaceholder: "Write your intention (Niyyah), thoughts or prayers here...",
                entriesTitle: "Saved Notes",
                msgSuccess: "Times calculated via Islamic method (15°).",
                msgErrorCalc: "Could not calculate times.",
                msgNetError: "Network error during fetch.",
                msgGPSLocating: "Locating GPS...",
                msgGPSFail: "GPS failed. Enter manually.",
                msgGPSNoSupport: "GPS not supported.",
                msgManualFillAll: "Fill all degrees and minutes.",
                copyright: "© 2026 Made for Seafarers",
                btnPrompt: "Suggestion"
            }
        };

        const humanistPrompts = {
            nl: [
                "Waar ben ik vandaag het meest dankbaar voor te midden van deze uitgestrekte oceaan?",
                "Welke oprechte intentie (Niyyah) zet ik voor deze dag?",
                "De zee is uitgestrekt en geduldig. Hoe kan ik vandaag zelf geduld oefenen?",
                "Een moment van stilte voor de mensen thuis. Wat wens ik ze toe?",
                "Zoals de golven komen en gaan, zo komen ook gedachten. Welke gedachte mag ik vandaag loslaten?",
                "Wat is mijn persoonlijke kompas of drijfveer vandaag?",
                "In de stilte van de nachtwacht vind ik rust. Wat leert deze stilte mij?",
                "Welke kleine daad van vriendelijkheid kan ik vandaag voor de bemanning doen?"
            ],
            en: [
                "What am I most grateful for today amidst this vast ocean?",
                "What sincere intention (Niyyah) am I setting for this day?",
                "The sea is vast and patient. How can I practice patience today?",
                "A moment of silence for loved ones at home. What do I wish for them?",
                "Just as waves come and go, so do thoughts. Which thought can I let go of today?",
                "What is my personal compass or motivation today?",
                "In the quiet of the night watch, I find peace. What does this silence teach me?",
                "What small act of kindness can I do for my crew today?"
            ]
        };

        function App() {
            const getDeviceLang = () => {
                const langs = navigator.languages || [navigator.language || navigator.userLanguage];
                for (let i = 0; i < langs.length; i++) {
                    const langCode = langs[i].toLowerCase();
                    if (langCode.startsWith('nl')) return 'nl';
                    if (langCode.startsWith('en')) return 'en';
                }
                return 'en';
            };
            
            const [lang, setLang] = useState(() => localStorage.getItem('appLang') || getDeviceLang());
            const t = translations[lang];

            const [journalText, setJournalText] = useState('');
            const [entries, setEntries] = useState(() => {
                const saved = localStorage.getItem('ramadanEntries');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => {
                localStorage.setItem('appLang', lang);
            }, [lang]);

            useEffect(() => {
                localStorage.setItem('ramadanEntries', JSON.stringify(entries));
            }, [entries]);

            const [solarDates, setSolarDates] = useState(null);
            const [solarTimes, setSolarTimes] = useState(null);
            const [countdown, setCountdown] = useState('--:--:--');
            const [nextEvent, setNextEvent] = useState('');
            const [nowTime, setNowTime] = useState(new Date());

            const [latDeg, setLatDeg] = useState(() => localStorage.getItem('latDeg') || '');
            const [latMin, setLatMin] = useState(() => localStorage.getItem('latMin') || '');
            const [latDir, setLatDir] = useState(() => localStorage.getItem('latDir') || 'N');
            
            const [lngDeg, setLngDeg] = useState(() => localStorage.getItem('lngDeg') || '');
            const [lngMin, setLngMin] = useState(() => localStorage.getItem('lngMin') || '');
            const [lngDir, setLngDir] = useState(() => localStorage.getItem('lngDir') || 'E');

            const [isLoadingLocation, setIsLoadingLocation] = useState(false);
            const [locationMessage, setLocationMessage] = useState('');

            useEffect(() => {
                localStorage.setItem('latDeg', latDeg);
                localStorage.setItem('latMin', latMin);
                localStorage.setItem('latDir', latDir);
                localStorage.setItem('lngDeg', lngDeg);
                localStorage.setItem('lngMin', lngMin);
                localStorage.setItem('lngDir', lngDir);
            }, [latDeg, latMin, latDir, lngDeg, lngMin, lngDir]);

            useEffect(() => {
                if (latDeg !== '' && lngDeg !== '') {
                    handleManualCalculate();
                }
            }, []);

            useEffect(() => {
                let interval;
                const updateTimer = () => {
                    const now = new Date();
                    setNowTime(now);

                    if (solarDates) {
                        let target;
                        let eventName;

                        if (now < solarDates.fajr) {
                            target = solarDates.fajr;
                            eventName = 'Fajr';
                        } else if (now >= solarDates.fajr && now < solarDates.iftar) {
                            target = solarDates.iftar;
                            eventName = 'Iftar';
                        } else {
                            // Als we na Iftar zitten, tellen we af naar de Fajr van de volgende dag
                            target = new Date(solarDates.fajr.getTime() + 24 * 60 * 60 * 1000);
                            eventName = 'Fajr';
                        }

                        const diff = target - now;
                        if (diff <= 0) {
                            setCountdown('00:00:00');
                            return;
                        }

                        const h = Math.floor(diff / (1000 * 60 * 60));
                        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const s = Math.floor((diff % (1000 * 60)) / 1000);

                        setCountdown(
                            `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`
                        );
                        setNextEvent(eventName);
                    } else {
                        setCountdown('--:--:--');
                        setNextEvent('');
                    }
                };

                updateTimer(); 
                interval = setInterval(updateTimer, 1000);
                return () => clearInterval(interval);
            }, [solarDates]);

            const handleSaveJournal = () => {
                if (journalText.trim() === '') return;
                const deviceLocale = navigator.language || 'en-US';
                const newEntry = {
                    id: Date.now(),
                    text: journalText,
                    date: new Date().toLocaleDateString(deviceLocale, { day: 'numeric', month: 'short' }),
                    time: new Date().toLocaleTimeString(deviceLocale, { hour: '2-digit', minute: '2-digit' })
                };
                setEntries([newEntry, ...entries]);
                setJournalText('');
            };

            const handleDeleteEntry = (id) => {
                setEntries(entries.filter(entry => entry.id !== id));
            };

            const generateRandomPrompt = () => {
                const promptList = humanistPrompts[lang];
                const randomPrompt = promptList[Math.floor(Math.random() * promptList.length)];
                setJournalText(prev => prev ? prev + '\n\n' + randomPrompt : randomPrompt);
            };

            const fetchSolarTimes = async (latitude, longitude) => {
                setIsLoadingLocation(true);
                setLocationMessage('');
                try {
                    // Gespecialiseerde Aladhan API - Method 2 (ISNA, 15 graden hoek)
                    const response = await fetch(`https://api.aladhan.com/v1/timings?latitude=${latitude}&longitude=${longitude}&method=2`);
                    const json = await response.json();
                    
                    if (json.code === 200) {
                        const times = json.data.timings;
                        
                        // Zet de "HH:MM" string om naar een Date object
                        const createDate = (timeStr) => {
                            const [hours, minutes] = timeStr.split(':').map(Number);
                            const d = new Date();
                            d.setHours(hours, minutes, 0, 0);
                            return d;
                        };

                        const fajr = createDate(times.Fajr);
                        const dhuhr = createDate(times.Dhuhr);
                        const asr = createDate(times.Asr);
                        const maghrib = createDate(times.Maghrib);
                        const isha = createDate(times.Isha);

                        setSolarDates({ fajr, dhuhr, asr, maghrib, isha, iftar: maghrib });
                        
                        setSolarTimes({
                            fajrLT: times.Fajr,
                            dhuhrLT: times.Dhuhr,
                            asrLT: times.Asr,
                            maghribLT: times.Maghrib,
                            ishaLT: times.Isha
                        });
                        setLocationMessage(t.msgSuccess);
                    } else {
                        setLocationMessage(t.msgErrorCalc);
                    }
                } catch (error) {
                    setLocationMessage(t.msgNetError);
                }
                setIsLoadingLocation(false);
            };

            const getGPSLocation = () => {
                if ("geolocation" in navigator) {
                    setIsLoadingLocation(true);
                    setLocationMessage(t.msgGPSLocating);
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const currentLat = position.coords.latitude;
                            const currentLng = position.coords.longitude;
                            
                            const isLatN = currentLat >= 0;
                            const absLat = Math.abs(currentLat);
                            setLatDeg(Math.floor(absLat).toString());
                            setLatMin(((absLat - Math.floor(absLat)) * 60).toFixed(2));
                            setLatDir(isLatN ? 'N' : 'S');

                            const isLngE = currentLng >= 0;
                            const absLng = Math.abs(currentLng);
                            setLngDeg(Math.floor(absLng).toString());
                            setLngMin(((absLng - Math.floor(absLng)) * 60).toFixed(2));
                            setLngDir(isLngE ? 'E' : 'W');

                            fetchSolarTimes(currentLat, currentLng);
                        },
                        (error) => {
                            setLocationMessage(t.msgGPSFail);
                            setIsLoadingLocation(false);
                        }
                    );
                } else {
                    setLocationMessage(t.msgGPSNoSupport);
                }
            };

            const handleManualCalculate = () => {
                if (latDeg !== '' && latMin !== '' && lngDeg !== '' && lngMin !== '') {
                    let calcLat = parseInt(latDeg) + (parseFloat(latMin) / 60);
                    if (latDir === 'S') calcLat = -calcLat;

                    let calcLng = parseInt(lngDeg) + (parseFloat(lngMin) / 60);
                    if (lngDir === 'W') calcLng = -calcLng;

                    fetchSolarTimes(calcLat, calcLng);
                } else {
                    setLocationMessage(t.msgManualFillAll);
                }
            };

            const renderDial = () => {
                if (!solarDates) return null;

                const getCoords = (date, radiusOffset = 0) => {
                    if (!date) return { x: 140, y: 140 };
                    const hours = date.getHours() + date.getMinutes() / 60 + date.getSeconds() / 3600;
                    const radians = (hours / 24) * 2 * Math.PI + Math.PI;
                    const r = 90 + radiusOffset;
                    return {
                        x: 140 + r * Math.sin(radians),
                        y: 140 - r * Math.cos(radians)
                    };
                };

                const nowCoords = getCoords(nowTime);

                const markers = [
                    { id: 'Fajr', name: 'Fajr', date: solarDates.fajr, time: solarTimes.fajrLT, color: '#059669' },
                    { id: 'Dhuhr', name: 'Dhuhr', date: solarDates.dhuhr, time: solarTimes.dhuhrLT, color: '#10b981' },
                    { id: 'Asr', name: 'Asr', date: solarDates.asr, time: solarTimes.asrLT, color: '#34d399' },
                    { id: 'Maghrib', name: 'Maghrib', date: solarDates.maghrib, time: solarTimes.maghribLT, color: '#047857' },
                    { id: 'Isha', name: 'Isha', date: solarDates.isha, time: solarTimes.ishaLT, color: '#064e3b' }
                ];

                return (
                    <div className="w-full flex justify-center py-4 relative">
                        <svg viewBox="0 0 280 280" className="w-full max-w-[320px] h-auto font-sans drop-shadow-sm">
                            <circle cx="140" cy="140" r="90" fill="none" stroke="#e7e5e4" strokeWidth="4" />
                            
                            <line x1="140" y1="45" x2="140" y2="55" stroke="#d6d3d1" strokeWidth="2" />
                            <line x1="140" y1="235" x2="140" y2="225" stroke="#d6d3d1" strokeWidth="2" />
                            <line x1="45" y1="140" x2="55" y2="140" stroke="#d6d3d1" strokeWidth="2" />
                            <line x1="235" y1="140" x2="225" y2="140" stroke="#d6d3d1" strokeWidth="2" />

                            <text x="140" y="130" textAnchor="middle" className="text-3xl font-mono fill-stone-800 tracking-widest font-light">
                                {countdown}
                            </text>
                            <text x="140" y="150" textAnchor="middle" className="text-[10px] uppercase tracking-widest font-bold fill-emerald-700">
                                {nextEvent === 'Fajr' ? t.timeTillFajr : (nextEvent === 'Iftar' ? t.timeTillIftar : t.fastTitleFallback)}
                            </text>
                            <text x="140" y="165" textAnchor="middle" className="text-[9px] fill-stone-400">
                                {nextEvent === 'Fajr' ? t.waitingFajr : t.waitingIftar}
                            </text>

                            {markers.map((prayer) => {
                                const pt = getCoords(prayer.date);
                                const lbl = getCoords(prayer.date, 30);
                                
                                return (
                                    <g key={prayer.id}>
                                        <circle cx={pt.x} cy={pt.y} r="5" fill={prayer.color} stroke="#fff" strokeWidth="1.5" />
                                        <text x={lbl.x} y={lbl.y - 4} textAnchor="middle" dominantBaseline="middle" className="text-[10px] font-bold fill-stone-600">
                                            {prayer.name}
                                        </text>
                                        <text x={lbl.x} y={lbl.y + 8} textAnchor="middle" dominantBaseline="middle" className="text-[9px] font-mono fill-stone-400">
                                            {prayer.time}
                                        </text>
                                    </g>
                                );
                            })}

                            <g>
                                <line x1="140" y1="140" x2={getCoords(nowTime, -8).x} y2={getCoords(nowTime, -8).y} stroke="#ef4444" strokeWidth="1" strokeDasharray="3,3" opacity="0.4" />
                                <circle cx={nowCoords.x} cy={nowCoords.y} r="4" fill="#ef4444" stroke="#fff" strokeWidth="1.5" />
                            </g>
                        </svg>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-stone-100 text-stone-800 font-sans pb-10">
                    <header className="bg-gradient-to-r from-emerald-800 to-teal-900 text-white p-6 shadow-md rounded-b-3xl relative">
                        <div className="absolute top-6 right-6">
                            <button onClick={() => setLang(lang === 'nl' ? 'en' : 'nl')} className="flex items-center gap-1 bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-full text-xs font-medium transition-colors border border-white/20">
                                <Globe size={14} />
                                {lang.toUpperCase()}
                            </button>
                        </div>
                        <div className="max-w-md mx-auto mt-2">
                            <h1 className="text-2xl font-semibold tracking-wide flex items-center gap-2">
                                <Anchor size={24} className="text-emerald-400" />
                                {t.title}
                            </h1>
                            <p className="text-stone-300 text-sm mt-1 font-light opacity-90">{t.subtitle}</p>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto px-4 mt-6 space-y-6">
                        <section className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <h2 className="text-lg font-medium text-stone-700 flex items-center gap-2 mb-3">
                                <Navigation size={20} className="text-emerald-700" />
                                {t.navTitle}
                            </h2>
                            <p className="text-sm text-stone-500 mb-5 leading-relaxed">{t.navDesc}</p>

                            <div className="space-y-3 mb-5">
                                <div className="flex flex-wrap items-center gap-2 bg-stone-50 p-2 rounded-lg border border-stone-200">
                                    <span className="text-xs font-semibold text-stone-500 w-8">LAT</span>
                                    <input type="number" min="0" max="90" value={latDeg} onChange={(e) => setLatDeg(e.target.value)} placeholder="00" className="w-16 p-2 text-sm rounded bg-white border border-stone-200 focus:ring-1 focus:ring-emerald-500 outline-none text-center font-mono" />
                                    <span className="text-stone-400 font-serif">°</span>
                                    <input type="number" min="0" max="60" step="0.01" value={latMin} onChange={(e) => setLatMin(e.target.value)} placeholder="00.00" className="w-20 p-2 text-
