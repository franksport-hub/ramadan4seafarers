        const QiblaCompass = ({ lat, lng, onClose, t }) => {
            const [rotation, setRotation] = useState(0);
            const [qibla, setQibla] = useState(0);
            const isDragging = useRef(false); const compassRef = useRef(null);
            const startAngle = useRef(0); const startRotation = useRef(0);

            useEffect(() => {
                if(lat && lng) {
                    const PI = Math.PI; const latk = 21.422487 * PI / 180; const lngk = 39.826206 * PI / 180;
                    const latRad = lat * PI / 180; const lngRad = lng * PI / 180;
                    const y = Math.sin(lngk - lngRad);
                    const x = Math.cos(latRad) * Math.tan(latk) - Math.sin(latRad) * Math.cos(lngk - lngRad);
                    setQibla(((Math.atan2(y, x) * 180 / PI) + 360) % 360);
                }
            }, [lat, lng]);

            const getAngle = (e) => {
                const rect = compassRef.current.getBoundingClientRect();
                const cx = rect.left + rect.width / 2; const cy = rect.top + rect.height / 2;
                const px = e.touches ? e.touches[0].clientX : e.clientX; const py = e.touches ? e.touches[0].clientY : e.clientY;
                return Math.atan2(py - cy, px - cx) * 180 / Math.PI;
            };

            const handleDown = (e) => { isDragging.current = true; startAngle.current = getAngle(e); startRotation.current = rotation; e.target.setPointerCapture(e.pointerId); };
            const handleMove = (e) => { if (isDragging.current) setRotation((startRotation.current + getAngle(e) - startAngle.current + 360) % 360); };
            const handleUp = (e) => { isDragging.current = false; e.target.releasePointerCapture(e.pointerId); };

            return (
                <div className="fixed inset-0 z-[70] bg-stone-900 flex flex-col items-center p-6 animate-in fade-in" dir="ltr">
                    <header className="w-full flex justify-between items-center text-white mt-4">
                        <button onClick={onClose} className="p-2 bg-white/10 rounded-full"><ChevronLeft size={24}/></button>
                        <h2 className="font-bold text-lg">{t.qiblaTitle}</h2><div className="w-10"></div>
                    </header>
                    <div className="flex-1 flex flex-col items-center justify-center w-full max-w-sm">
                        <p className="text-emerald-400 font-mono text-xl mb-4 text-center">Qibla: {Math.round(qibla)}° <br/><span className="text-xs text-stone-400">Heading: {Math.round((360 - rotation) % 360)}°</span></p>
                        <div className="relative w-80 h-80">
                            <div className="absolute inset-0 transition-transform duration-100 ease-out pointer-events-none z-10" style={{ transform: `rotate(${qibla + rotation}deg)` }}>
                                <div className="absolute top-4 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[12px] border-l-transparent border-r-[12px] border-r-transparent border-b-[40px] border-b-emerald-400 drop-shadow-[0_0_10px_rgba(52,211,153,0.8)]"></div>
                            </div>
                            <div ref={compassRef} onPointerDown={handleDown} onPointerMove={handleMove} onPointerUp={handleUp} onPointerCancel={handleUp} className="absolute inset-0 rounded-full border-4 border-emerald-900 bg-stone-800 touch-none cursor-grab active:cursor-grabbing shadow-[0_0_30px_rgba(0,0,0,0.5)]" style={{ transform: `rotate(${rotation}deg)` }}>
                                {Array.from({ length: 72 }).map((_, i) => i * 5).map(deg => (
                                    <div key={deg} className="absolute inset-0" style={{ transform: `rotate(${deg}deg)` }}><div className={`mx-auto bg-stone-500 ${deg % 90 === 0 ? 'w-1.5 h-4 bg-emerald-500' : deg % 30 === 0 ? 'w-1 h-3' : 'w-0.5 h-2'}`}></div></div>
                                ))}
                                <span className="absolute top-6 left-1/2 -translate-x-1/2 text-white font-bold text-xl">N</span>
                                <span className="absolute bottom-6 left-1/2 -translate-x-1/2 text-white font-bold text-xl rotate-180">S</span>
                                <span className="absolute right-6 top-1/2 -translate-y-1/2 text-white font-bold text-xl -rotate-90">E</span>
                                <span className="absolute left-6 top-1/2 -translate-y-1/2 text-white font-bold text-xl rotate(90deg)">W</span>
                            </div>
                        </div>
                        <p className="text-stone-400 text-sm mt-10 text-center max-w-xs">{t.qiblaInst}</p>
                    </div>
                </div>
            );
        };

        function App() {
            const getDeviceLang = () => navigator.language.split('-')[0];
            const [lang, setLang] = useState(() => localStorage.getItem('appLang') || (translations[getDeviceLang()] ? getDeviceLang() : 'en'));
            const t = translations[lang];
            const isRTL = lang === 'ar';

            const [showUpdatePopup, setShowUpdatePopup] = useState(false);
            const [journalText, setJournalText] = useState('');
            const [entries, setEntries] = useState(() => JSON.parse(localStorage.getItem('ramadanEntries') || '[]'));
            
            const [solarDates, setSolarDates] = useState(null);
            const [solarTimes, setSolarTimes] = useState(null);
            const [countdown, setCountdown] = useState('--:--:--');
            const [nextEvent, setNextEvent] = useState('');
            const [upcomingFestival, setUpcomingFestival] = useState('');
            
            const [showInfo, setShowInfo] = useState(false);
            const [showCompass, setShowCompass] = useState(false);
            const [fallbackApplied, setFallbackApplied] = useState({ fajr: false, isha: false, nextFajr: false });
            
            const [latDeg, setLatDeg] = useState(() => localStorage.getItem('latDeg') || '');
            const [latMin, setLatMin] = useState(() => localStorage.getItem('latMin') || '');
            const [latDir, setLatDir] = useState(() => localStorage.getItem('latDir') || 'N');
            const [lngDeg, setLngDeg] = useState(() => localStorage.getItem('lngDeg') || '');
            const [lngMin, setLngMin] = useState(() => localStorage.getItem('lngMin') || '');
            const [lngDir, setLngDir] = useState(() => localStorage.getItem('lngDir') || 'E');
            
            const [isGpsActive, setIsGpsActive] = useState(false);
            const [velocity, setVelocity] = useState({ speed: 0, course: 0 });
            
            const watchIdRef = useRef(null);

            useEffect(() => {
                const hasSeenUpdate = localStorage.getItem('hasSeenUpdateV5_Offline');
                if (!hasSeenUpdate) setShowUpdatePopup(true);
            }, []);

            useEffect(() => {
                const now = new Date();
                const nextFestival = islamicEvents.find(e => e.date > now);
                if (nextFestival) {
                    const diffDays = Math.ceil((nextFestival.date - now) / 86400000);
                    let fname = nextFestival.name;
                    if (lang === 'nl' && fname === 'Islamic New Year') fname = 'Islamitisch Nieuwjaar';
                    if (lang === 'ar') {
                        const arNames = {"Eid al-Fitr": "عيد الفطر", "Eid al-Adha": "عيد الأضحى", "Islamic New Year": "رأس السنة الهجرية", "Ashura": "عاشوراء", "Mawlid an-Nabi": "المولد النبوي"};
                        fname = arNames[fname] || fname;
                    }
                    setUpcomingFestival(diffDays === 0 ? `${t.todayIs} ${fname}!` : `${t.daysUntil} ${diffDays} ${t.days} ${fname}`);
                }
            }, [lang, t]);

            useEffect(() => { localStorage.setItem('appLang', lang); localStorage.setItem('ramadanEntries', JSON.stringify(entries)); }, [lang, entries]);
            useEffect(() => {
                localStorage.setItem('latDeg', latDeg); localStorage.setItem('latMin', latMin); localStorage.setItem('latDir', latDir);
                localStorage.setItem('lngDeg', lngDeg); localStorage.setItem('lngMin', lngMin); localStorage.setItem('lngDir', lngDir);
            }, [latDeg, latMin, latDir, lngDeg, lngMin, lngDir]);

            // --- De Timer Logica ---
            useEffect(() => {
                let interval;
                if (solarDates) {
                    const updateTimer = () => {
                        const now = new Date();
                        const prayers = [
                            { name: t.fajr, date: solarDates.fajr }, { name: t.dhuhr, date: solarDates.dhuhr },
                            { name: t.asr, date: solarDates.asr }, { name: t.maghrib, date: solarDates.maghrib },
                            { name: t.isha, date: solarDates.isha }, { name: t.nextFajr, date: solarDates.nextFajr }
                        ];
                        const future = prayers.filter(p => p.date && p.date > now).sort((a, b) => a.date - b.date);
                        const nextPrayer = future.length > 0 ? future[0] : prayers[prayers.length - 1];
                        
                        if (nextPrayer && nextPrayer.date) {
                            const diff = nextPrayer.date - now;
                            if(diff > 0) {
                                const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
                                setCountdown(`${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`);
                                setNextEvent(`${t.timeTill} ${nextPrayer.name}`);
                            } else { setCountdown('00:00:00'); }
                        }
                    };
                    updateTimer(); interval = setInterval(updateTimer, 1000);
                }
                return () => clearInterval(interval);
            }, [solarDates, t]);

            // --- DE NIEUWE VOLLEDIG OFFLINE REKENMOTOR (SunCalc) ---
            const calculateSolarTimes = (latitude, longitude, speedKts = 0, course = 0) => {
                try {
                    const now = new Date();
                    const tomorrow = new Date(now.getTime() + 86400000);

                    // Haal basis zondata lokaal op (gebruikt de -18 graden limieten van SunCalc)
                    let timesToday = SunCalc.getTimes(now, latitude, longitude);
                    let timesTom = SunCalc.getTimes(tomorrow, latitude, longitude);

                    let dawn = timesToday.nightEnd; // Dit is exact -18 graden (Fajr)
                    let rise = timesToday.sunrise;
                    let dhuhr = timesToday.solarNoon;
                    let sunset = timesToday.sunset;
                    let isha = timesToday.night; // Dit is exact -18 graden (Isha)
                    let nextDawn = timesTom.nightEnd;
                    let nextRise = timesTom.sunrise;

                    // DR Correctie (Dead Reckoning)
                    if (speedKts > 2) {
                        if (sunset && !isNaN(sunset.getTime())) {
                            const timeToSunset = (sunset - new Date()) / 3600000;
                            if (timeToSunset > 0 && timeToSunset < 12) {
                                const dist = speedKts * timeToSunset;
                                const dLat = (dist * Math.cos(course * Math.PI / 180)) / 60;
                                const dLng = (dist * Math.sin(course * Math.PI / 180)) / (60 * Math.cos(latitude * Math.PI / 180));
                                timesToday = SunCalc.getTimes(now, latitude + dLat, longitude + dLng);
                                sunset = timesToday.sunset;
                                dhuhr = timesToday.solarNoon;
                            }
                        }
                        if (nextDawn && !isNaN(nextDawn.getTime())) {
                            const timeToTomFajr = (nextDawn - new Date()) / 3600000;
                            if (timeToTomFajr > 0 && timeToTomFajr < 24) {
                                const dist = speedKts * timeToTomFajr;
                                const dLat = (dist * Math.cos(course * Math.PI / 180)) / 60;
                                const dLng = (dist * Math.sin(course * Math.PI / 180)) / (60 * Math.cos(latitude * Math.PI / 180));
                                timesTom = SunCalc.getTimes(tomorrow, latitude + dLat, longitude + dLng);
                                nextDawn = timesTom.nightEnd;
                                nextRise = timesTom.sunrise;
                            }
                        }
                    }

                    // Fallback Logica voor Hoge Breedtegraden (Witte Nachten)
                    const isInv = (d) => !d || isNaN(d.getTime()) || d.getFullYear() === 1970;
                    let fbFajr = false; let fbIsha = false; let fbNextFajr = false;

                    if (isInv(rise) || isInv(sunset)) {
                        if (isInv(dhuhr)) dhuhr = new Date(now.setHours(12, 0, 0, 0));
                        rise = new Date(dhuhr.getTime() - 6 * 3600000);
                        sunset = new Date(dhuhr.getTime() + 6 * 3600000);
                        fbFajr = true; fbIsha = true; fbNextFajr = true;
                    }
                    if (isInv(dawn) || dawn > rise) { dawn = new Date(rise.getTime() - 90 * 60000); fbFajr = true; }
                    if (isInv(isha) || isha < sunset) { isha = new Date(sunset.getTime() + 90 * 60000); fbIsha = true; }
                    if (isInv(nextDawn) || nextDawn > nextRise) { nextDawn = new Date(nextRise.getTime() - 90 * 60000); fbNextFajr = true; }

                    setFallbackApplied({ fajr: fbFajr, isha: fbIsha, nextFajr: fbNextFajr });

                    // Bereken Asr
                    let asr = new Date(dhuhr.getTime() + (sunset.getTime() - dhuhr.getTime()) * 0.55);

                    setSolarDates({ fajr: dawn, dhuhr, asr, maghrib: sunset, isha, nextFajr: nextDawn });

                    const o = { hour: '2-digit', minute: '2-digit' };
                    setSolarTimes({
                        fajr: dawn.toLocaleTimeString([], o), dhuhr: dhuhr.toLocaleTimeString([], o), asr: asr.toLocaleTimeString([], o),
                        maghrib: sunset.toLocaleTimeString([], o), isha: isha.toLocaleTimeString([], o), nextFajr: nextDawn.toLocaleTimeString([], o)
                    });
                } catch (e) {
                    console.error("Berekeningsfout:", e);
                }
            };

            const doCalc = () => {
                if (latDeg !== '' && lngDeg !== '') {
                    let lat = parseFloat(latDeg) + (parseFloat(latMin || 0) / 60); lat = latDir === 'S' ? -lat : lat;
                    let lng = parseFloat(lngDeg) + (parseFloat(lngMin || 0) / 60); lng = lngDir === 'W' ? -lng : lng;
                    calculateSolarTimes(lat, lng, 0, 0);
                } else { alert("Vul LAT en LNG in"); }
            };

            const toggleGps = () => {
                if (isGpsActive) {
                    if (watchIdRef.current) navigator.geolocation.clearWatch(watchIdRef.current);
                    setIsGpsActive(false); setVelocity({ speed: 0, course: 0 });
                } else if (navigator.geolocation) {
                    setIsGpsActive(true); 
                    watchIdRef.current = navigator.geolocation.watchPosition((p) => {
                        const la = p.coords.latitude; const lo = p.coords.longitude;
                        const sog = p.coords.speed ? p.coords.speed * 1.94384 : 0;
                        setLatDeg(Math.floor(Math.abs(la))); setLatMin(((Math.abs(la) % 1) * 60).toFixed(2)); setLatDir(la >= 0 ? 'N' : 'S');
                        setLngDeg(Math.floor(Math.abs(lo))); setLngMin(((Math.abs(lo) % 1) * 60).toFixed(2)); setLngDir(lo >= 0 ? 'E' : 'W');
                        setVelocity({ speed: sog, course: p.coords.heading || 0 });
                        calculateSolarTimes(la, lo, sog, p.coords.heading || 0);
                    }, (err) => { setIsGpsActive(false); }, { enableHighAccuracy: true });
                }
            };

            const isFajrPassed = solarDates && solarDates.fajr ? new Date() > solarDates.fajr : false;

            return (
                <div className={`min-h-screen bg-stone-100 text-stone-800 font-sans pb-10 ${isRTL ? 'text-right' : 'text-left'}`} dir={isRTL ? 'rtl' : 'ltr'}>
                    
                    {showUpdatePopup && (
                        <div className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-stone-900/70 backdrop-blur-sm animate-in fade-in" dir={isRTL ? 'rtl' : 'ltr'}>
                            <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden border-2 border-emerald-500">
                                <div className="bg-emerald-100 p-5 text-center">
                                    <Sparkles size={32} className="mx-auto text-emerald-600 mb-2" />
                                    <h3 className="font-bold text-lg text-emerald-900">{t.updTitle}</h3>
                                </div>
                                <div className="p-5 space-y-3 text-sm text-stone-700">
                                    <ul className={`space-y-2 list-disc ${isRTL ? 'pr-4' : 'pl-4'} marker:text-emerald-500`}>
                                        <li>{t.updPoint1}</li>
                                        <li>{t.updPoint2}</li>
                                        <li>{t.updPoint3}</li>
                                        <li className="font-medium text-emerald-800">{t.updPoint4}</li>
                                    </ul>
                                    <p className="mt-4 pt-3 border-t border-stone-200 text-xs italic text-stone-500 text-center">{t.updPoint5}</p>
                                    <button onClick={() => { localStorage.setItem('hasSeenUpdateV5_Offline', 'true'); setShowUpdatePopup(false); }} className="w-full mt-4 bg-emerald-700 text-white py-3 rounded-xl font-bold hover:bg-emerald-800 transition">
                                        {t.updBtn}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showCompass && latDeg !== '' && lngDeg !== '' && (
                        <QiblaCompass lat={parseFloat(latDeg)} lng={parseFloat(lngDeg)} onClose={() => setShowCompass(false)} t={t} />
                    )}

                    {showInfo && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-stone-900/60 backdrop-blur-sm animate-in fade-in" dir={isRTL ? 'rtl' : 'ltr'}>
                            <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden text-sm">
                                <div className="bg-emerald-900 p-4 flex justify-between items-center text-white font-bold">
                                    <h3><InfoCircle size={18} className={`inline ${isRTL ? 'ml-2' : 'mr-2'}`} /> {t.infoTitle}</h3>
                                    <button onClick={() => setShowInfo(false)}><XIcon size={16} /></button>
                                </div>
                                <div className="p-5 space-y-4 text-stone-700">
                                    <div><h4 className="font-bold text-emerald-800">{t.infoBaseTitle}</h4><p>{t.infoBase}</p></div>
                                    <div className="border-t pt-3"><h4 className="font-bold text-emerald-800">{t.infoDRTitle}</h4><p>{t.infoDR}</p></div>
                                    <div className="border-t pt-3"><h4 className="font-bold text-emerald-800">{t.infoHighLatTitle}</h4><p>{t.infoHighLat}</p></div>
                                    
                                    <div className="mt-4 pt-4 border-t border-stone-200 text-center">
                                        <a href="https://www.paypal.com/donate/?business=frankrburg@gmail.com&no_recurring=0&item_name=Support+Islam+at+Sea" target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 bg-emerald-100 text-emerald-800 px-4 py-2 rounded-full font-bold hover:bg-emerald-200 transition shadow-sm">
                                            <HeartIcon size={16} className="text-emerald-600"/> {t.support}
                                        </a>
                                    </div>
                                    <button onClick={() => setShowInfo(false)} className="w-full mt-4 bg-stone-100 py-2.5 rounded-lg font-bold">{t.btnClose}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="bg-emerald-900 text-white p-6 shadow-md rounded-b-3xl relative">
                        <div className={`absolute top-6 ${isRTL ? 'left-6' : 'right-6'} flex gap-2`} dir="ltr">
                            <button onClick={() => setShowCompass(true)} className="bg-emerald-500/20 text-emerald-300 p-2 rounded-full border border-emerald-400/30 active:scale-95"><CompassIcon size={18} /></button>
                            <button onClick={() => setShowInfo(true)} className="bg-white/10 p-2 rounded-full border border-white/20 active:scale-95"><InfoCircle size={18} /></button>
                            <button onClick={() => {
                                const cycle = ['en', 'nl', 'ar', 'id'];
                                setLang(cycle[(cycle.indexOf(lang) + 1) % cycle.length]);
                            }} className="bg-white/10 p-2 rounded-full border border-white/20 active:scale-95 flex items-center justify-center font-bold text-xs w-9 h-9 uppercase">
                                {lang === 'ar' ? 'ع' : lang}
                            </button>
                        </div>
                        <div className={`max-w-md mx-auto ${isRTL ? 'pl-32' : 'pr-32'}`}>
                            <h1 className="text-2xl font-bold flex items-center gap-2 tracking-tight"><Anchor size={24} className="text-emerald-400" /> {t.title}</h1>
                            <p className="text-stone-300 text-xs mt-1 font-light">{t.subtitle}</p>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto px-4 mt-6 space-y-6">
                        <section className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <h2 className="text-lg font-medium flex items-center gap-2 mb-4"><Navigation size={20} className="text-emerald-700" /> {t.navTitle}</h2>
                            <div className="space-y-3 mb-2" dir="ltr">
                                <div className="flex items-center gap-2 bg-stone-50 p-2 rounded-lg border border-stone-100">
                                    <span className="text-[10px] font-bold w-8 text-stone-400">LAT</span>
                                    <input type="number" value={latDeg} onChange={e=>setLatDeg(e.target.value)} disabled={isGpsActive} className="w-12 p-1 text-center bg-transparent border-b border-stone-200 outline-none disabled:opacity-50" />°
                                    <input type="number" value={latMin} onChange={e=>setLatMin(e.target.value)} disabled={isGpsActive} className="w-16 p-1 text-center bg-transparent border-b border-stone-200 outline-none disabled:opacity-50" />'
                                    <select value={latDir} onChange={e=>setLatDir(e.target.value)} disabled={isGpsActive} className="bg-transparent font-bold text-emerald-800"><option>N</option><option>S</option></select>
                                </div>
                                <div className="flex items-center gap-2 bg-stone-50 p-2 rounded-lg border border-stone-100">
                                    <span className="text-[10px] font-bold w-8 text-stone-400">LNG</span>
                                    <input type="number" value={lngDeg} onChange={e=>setLngDeg(e.target.value)} disabled={isGpsActive} className="w-12 p-1 text-center bg-transparent border-b border-stone-200 outline-none disabled:opacity-50" />°
                                    <input type="number" value={lngMin} onChange={e=>setLngMin(e.target.value)} disabled={isGpsActive} className="w-16 p-1 text-center bg-transparent border-b border-stone-200 outline-none disabled:opacity-50" />'
                                    <select value={lngDir} onChange={e=>setLngDir(e.target.value)} disabled={isGpsActive} className="bg-transparent font-bold text-emerald-800"><option>E</option><option>W</option></select>
                                </div>
                            </div>
                            <div className={`flex justify-between px-2 text-[10px] font-mono mb-4 transition-opacity ${isGpsActive ? 'text-emerald-700' : 'text-stone-300 opacity-0'}`} dir="ltr">
                                <span>SOG: {velocity.speed.toFixed(1)} kts</span>
                                <span className="flex items-center gap-1"><span className="animate-pulse text-emerald-500">●</span> Live GPS</span>
                                <span>COG: {Math.round(velocity.course)}°</span>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={toggleGps} className={`flex-1 py-3 rounded-xl font-bold border transition-colors ${isGpsActive ? 'bg-emerald-100 text-emerald-800 border-emerald-300' : 'bg-stone-100 text-stone-700 border-stone-200'}`}>
                                    {isGpsActive ? t.btnGPS : t.btnGPSOff}
                                </button>
                                <button onClick={doCalc} disabled={isGpsActive} className="flex-[2] bg-emerald-700 text-white py-3 rounded-xl font-bold shadow-md disabled:bg-stone-300">
                                    {t.btnCalc}
                                </button>
                            </div>
                        </section>

                        <section className="bg-emerald-50 p-6 rounded-2xl border border-emerald-100 text-center shadow-inner relative overflow-hidden flex flex-col items-center justify-center min-h-[160px]">
                            <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none">
                                {nextEvent.includes(t.fajr) || nextEvent.includes(t.isha) ? <Moon size={120} /> : <Sun size={120} />}
                            </div>
                            <h2 className="text-xs font-bold text-emerald-800 uppercase tracking-widest mb-2 relative z-10">{nextEvent}</h2>
                            <p className="text-5xl font-light tabular-nums tracking-tighter text-stone-900 relative z-10" dir="ltr">{countdown}</p>
                            {!solarDates && <p className="text-[10px] mt-2 text-stone-400">{t.waitingForLoc}</p>}
                            
                            {upcomingFestival && (
                                <div className="mt-4 inline-flex items-center gap-1.5 bg-white/60 px-3 py-1.5 rounded-full border border-emerald-200 shadow-sm relative z-10">
                                    <CalendarIcon size={14} className="text-emerald-600" />
                                    <span className="text-[10px] font-bold text-emerald-800 uppercase tracking-wider">{upcomingFestival}</span>
                                </div>
                            )}
                        </section>

                        {solarTimes && (
                            <section className="bg-white p-4 rounded-2xl border border-stone-200 shadow-sm overflow-hidden text-center">
                                <div className="grid grid-cols-6 gap-0.5" dir="ltr">
                                    <div className={`py-2 rounded-l-lg border-r border-white ${isFajrPassed ? 'bg-stone-100' : 'bg-emerald-50'}`}>
                                        <p className={`text-[7px] font-bold uppercase ${isFajrPassed ? 'text-stone-400' : 'text-emerald-800'}`}>{t.fajr}</p>
                                        <p className={`text-[11px] font-bold ${isFajrPassed ? 'text-stone-400 opacity-60' : 'text-stone-800'}`}>{solarTimes.fajr}{fallbackApplied.fajr && <span className="text-amber-500">*</span>}</p>
                                    </div>
                                    <div className="bg-stone-50 py-2 border-r border-white"><p className="text-[7px] font-bold text-stone-400 uppercase">{t.dhuhr}</p><p className="text-[11px] font-medium text-stone-700">{solarTimes.dhuhr}</p></div>
                                    <div className="bg-stone-50 py-2 border-r border-white"><p className="text-[7px] font-bold text-stone-400 uppercase">{t.asr}</p><p className="text-[11px] font-medium text-stone-700">{solarTimes.asr}</p></div>
                                    <div className="bg-emerald-50 py-2 border-r border-white"><p className="text-[7px] font-bold text-emerald-800 uppercase">{t.maghrib}</p><p className="text-[11px] font-bold text-stone-800">{solarTimes.maghrib}</p></div>
                                    <div className="bg-stone-50 py-2 border-r border-white"><p className="text-[7px] font-bold text-stone-400 uppercase">{t.isha}</p><p className="text-[11px] font-medium text-stone-700">{solarTimes.isha}{fallbackApplied.isha && <span className="text-amber-500">*</span>}</p></div>
                                    <div className="bg-emerald-100/50 py-2 rounded-r-lg"><p className="text-[7px] font-bold text-emerald-800 uppercase">{t.nextFajr}</p><p className="text-[11px] font-bold text-stone-800">{solarTimes.nextFajr}{fallbackApplied.nextFajr && <span className="text-amber-500">*</span>}</p></div>
                                </div>
                            </section>
                        )}

                        <section className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                             <div className="flex justify-between items-center mb-4">
                                <h2 className="font-medium flex items-center gap-2"><BookOpen size={18} className="text-emerald-700"/>{t.refTitle}</h2>
                                <button onClick={()=>setJournalText(prev => prev + (prev ? '\n\n' : '') + humanistPrompts[lang][Math.floor(Math.random()*3)])} className="text-emerald-700 bg-emerald-50 px-3 py-1 rounded-full text-[10px] flex items-center gap-1 border border-emerald-100 hover:bg-emerald-100"><Sparkles size={12}/> {t.btnPrompt}</button>
                            </div>
                             <textarea value={journalText} onChange={e=>setJournalText(e.target.value)} className="w-full h-24 p-3 border border-stone-200 rounded-xl text-sm mb-2 outline-none shadow-inner" placeholder={t.refPlaceholder}></textarea>
                             <button onClick={() => { if (!journalText.trim()) return; setEntries([{ id: Date.now(), text: journalText, date: new Date().toLocaleDateString(lang, { day: 'numeric', month: 'short' }), time: new Date().toLocaleTimeString(lang, { hour: '2-digit', minute: '2-digit' }) }, ...entries]); setJournalText(''); }} className="w-full bg-emerald-800 text-white py-2 rounded-lg text-sm font-medium hover:bg-emerald-900">Opslaan</button>
                        </section>

                        <div className="space-y-3">
                            {entries.map(e=>(<div key={e.id} className="bg-white p-4 rounded-xl border border-stone-200 relative shadow-sm group">
                                <span className="text-[9px] text-emerald-700 font-bold uppercase tracking-wider" dir="ltr">{e.date} • {e.time}</span>
                                <p className="text-sm mt-1 leading-relaxed text-stone-700">{e.text}</p>
                                <button onClick={()=>setEntries(entries.filter(i=>i.id!==e.id))} className={`absolute top-4 ${isRTL ? 'left-4' : 'right-4'} text-stone-300 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity`}><Trash2 size={14}/></button>
                            </div>))}
                        </div>
                        <footer className="text-center py-4"><p className="text-[10px] text-stone-400 font-medium uppercase tracking-widest">{t.copyright}</p></footer>
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); }); }
    </script>
</body>
</html>
