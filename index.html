<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#064e3b">
    <title>Nautische Reflectie Gids</title>

    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-stone-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Iconen ---
        const Icon = ({ children, size = 24, className = "", ...rest }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...rest}>
                {children}
            </svg>
        );
        const Sun = (p) => <Icon {...p}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></Icon>;
        const Moon = (p) => <Icon {...p}><path d="M12 3a6.364 6.364 0 0 0 9 9 9 9 0 1 1-9-9Z"/></Icon>;
        const BookOpen = (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
        const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></Icon>;
        const Send = (p) => <Icon {...p}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></Icon>;
        const Navigation = (p) => <Icon {...p}><polygon points="3 11 22 2 13 21 11 13 3 11"/></Icon>;
        const MapPin = (p) => <Icon {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;
        const Anchor = (p) => <Icon {...p}><circle cx="12" cy="5" r="3"/><line x1="12" x2="12" y1="8" y2="22"/><line x1="5" x2="19" y1="12" y2="12"/><path d="M5 12c0 3.866 3.134 7 7 7s7-3.134 7-7"/></Icon>;
        const Loader2 = (p) => <Icon {...p}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Icon>;
        const Globe = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></Icon>;
        const Trash2 = (p) => <Icon {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></Icon>;
        const Sparkles = (p) => <Icon {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></Icon>;
        const Sunrise = (p) => <Icon {...p}><path d="M12 2v8"/><path d="m4.93 10.93 1.41-1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41-1.41"/><path d="M22 22H2"/><path d="m8 22 4-4 4 4"/><path d="M16 18a4 4 0 0 0-8 0"/></Icon>;

        const translations = {
            nl: {
                title: "Nautische Reflectie Gids",
                subtitle: "Gebedstijden & Bezinning op volle zee.",
                navTitle: "Positie & Berekening",
                navDesc: "Gebruik GPS of voer handmatig de positie in.",
                btnGPS: "GPS",
                btnCalc: "Bereken",
                fajr: "Fajr", sunrise: "Opkomst", dhuhr: "Dhuhr", asr: "Asr", maghrib: "Iftar", isha: "Isha",
                timeTillFajr: "Tijd tot Fajr", timeTillIftar: "Tijd tot Iftar",
                waitingForLoc: "Geef een locatie op...",
                refTitle: "Notities & Intenties",
                refPlaceholder: "Schrijf hier je gedachten...",
                entriesTitle: "Opgeslagen Notities",
                btnPrompt: "Suggestie",
                copyright: "© 2026 Maritieme Reflectie",
                legend: "* Tijden markeren de start van een gebedsperiode."
            },
            en: {
                title: "Nautical Reflection Guide",
                subtitle: "Prayer times & reflection at sea.",
                navTitle: "Position & Calculation",
                navDesc: "Use GPS or manually enter position.",
                btnGPS: "GPS",
                btnCalc: "Calc",
                fajr: "Fajr", sunrise: "Sunrise", dhuhr: "Dhuhr", asr: "Asr", maghrib: "Iftar", isha: "Isha",
                timeTillFajr: "Time till Fajr", timeTillIftar: "Time till Iftar",
                waitingForLoc: "Enter a location...",
                refTitle: "Notes & Intentions",
                refPlaceholder: "Write your thoughts...",
                entriesTitle: "Saved Notes",
                btnPrompt: "Suggestion",
                copyright: "© 2026 Maritime Reflection",
                legend: "* Times mark the start of a prayer period."
            }
        };

        const humanistPrompts = {
            nl: ["Waar ben ik vandaag dankbaar voor?", "Welke intentie zet ik vandaag?", "De zee is geduldig, hoe kan ik dat ook zijn?", "Wat wens ik de mensen thuis toe?", "Wat leer ik van de stilte?"],
            en: ["What am I grateful for today?", "What intention am I setting?", "The sea is patient, how can I be too?", "What do I wish for loved ones?", "What does silence teach me?"]
        };

        function App() {
            const getDeviceLang = () => (navigator.language || 'en').startsWith('nl') ? 'nl' : 'en';
            const [lang, setLang] = useState(() => localStorage.getItem('appLang') || getDeviceLang());
            const t = translations[lang];
            const [journalText, setJournalText] = useState('');
            const [entries, setEntries] = useState(() => JSON.parse(localStorage.getItem('ramadanEntries') || '[]'));

            useEffect(() => { localStorage.setItem('appLang', lang); }, [lang]);
            useEffect(() => { localStorage.setItem('ramadanEntries', JSON.stringify(entries)); }, [entries]);

            const [solarDates, setSolarDates] = useState(null);
            const [countdown, setCountdown] = useState('--:--:--');
            const [nextEvent, setNextEvent] = useState('');
            const [latDeg, setLatDeg] = useState(() => localStorage.getItem('latDeg') || '');
            const [latMin, setLatMin] = useState(() => localStorage.getItem('latMin') || '');
            const [latDir, setLatDir] = useState(() => localStorage.getItem('latDir') || 'N');
            const [lngDeg, setLngDeg] = useState(() => localStorage.getItem('lngDeg') || '');
            const [lngMin, setLngMin] = useState(() => localStorage.getItem('lngMin') || '');
            const [lngDir, setLngDir] = useState(() => localStorage.getItem('lngDir') || 'E');
            const [solarTimes, setSolarTimes] = useState(null);
            const [isLoadingLocation, setIsLoadingLocation] = useState(false);

            useEffect(() => {
                localStorage.setItem('latDeg', latDeg); localStorage.setItem('latMin', latMin); localStorage.setItem('latDir', latDir);
                localStorage.setItem('lngDeg', lngDeg); localStorage.setItem('lngMin', lngMin); localStorage.setItem('lngDir', lngDir);
            }, [latDeg, latMin, latDir, lngDeg, lngMin, lngDir]);

            useEffect(() => { if (latDeg && lngDeg) handleManualCalculate(); }, []);

            useEffect(() => {
                let interval;
                if (solarDates) {
                    const updateTimer = () => {
                        const now = new Date();
                        let target, eventName;
                        if (now < solarDates.fajr) { target = solarDates.fajr; eventName = 'Fajr'; }
                        else if (now < solarDates.iftar) { target = solarDates.iftar; eventName = 'Iftar'; }
                        else { target = new Date(solarDates.fajr.getTime() + 86400000); eventName = 'Fajr'; }
                        const diff = target - now;
                        const h = Math.floor(diff / 3600000);
                        const m = Math.floor((diff % 3600000) / 60000);
                        const s = Math.floor((diff % 60000) / 1000);
                        setCountdown(`${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`);
                        setNextEvent(eventName);
                    };
                    updateTimer(); interval = setInterval(updateTimer, 1000);
                }
                return () => clearInterval(interval);
            }, [solarDates]);

            const fetchSolarTimes = async (latitude, longitude) => {
                setIsLoadingLocation(true);
                try {
                    const res = await fetch(`https://api.sunrise-sunset.org/json?lat=${latitude}&lng=${longitude}&formatted=0`);
                    const data = await res.json();
                    if (data.status === 'OK') {
                        const dawn = new Date(data.results.astronomical_twilight_begin);
                        const rise = new Date(data.results.sunrise);
                        const dhuhr = new Date(data.results.solar_noon);
                        const sunset = new Date(data.results.sunset);
                        const isha = new Date(data.results.astronomical_twilight_end);
                        const asr = new Date(dhuhr.getTime() + (sunset.getTime() - dhuhr.getTime()) * 0.55);
                        setSolarDates({ fajr: dawn, iftar: sunset });
                        const opts = { hour: '2-digit', minute: '2-digit' };
                        setSolarTimes({
                            fajr: dawn.toLocaleTimeString([], opts),
                            sunrise: rise.toLocaleTimeString([], opts),
                            dhuhr: dhuhr.toLocaleTimeString([], opts),
                            asr: asr.toLocaleTimeString([], opts),
                            maghrib: sunset.toLocaleTimeString([], opts),
                            isha: isha.toLocaleTimeString([], opts)
                        });
                    }
                } catch (e) { console.error(e); }
                setIsLoadingLocation(false);
            };

            const handleManualCalculate = () => {
                if (latDeg && latMin && lngDeg && lngMin) {
                    let lat = parseInt(latDeg) + (parseFloat(latMin) / 60); if (latDir === 'S') lat = -lat;
                    let lng = parseInt(lngDeg) + (parseFloat(lngMin) / 60); if (lngDir === 'W') lng = -lng;
                    fetchSolarTimes(lat, lng);
                }
            };

            const getGPS = () => {
                if (navigator.geolocation) {
                    setIsLoadingLocation(true);
                    navigator.geolocation.getCurrentPosition(p => {
                        const la = p.coords.latitude; const lo = p.coords.longitude;
                        setLatDeg(Math.floor(Math.abs(la))); setLatMin(((Math.abs(la) % 1) * 60).toFixed(2)); setLatDir(la >= 0 ? 'N' : 'S');
                        setLngDeg(Math.floor(Math.abs(lo))); setLngMin(((Math.abs(lo) % 1) * 60).toFixed(2)); setLngDir(lo >= 0 ? 'E' : 'W');
                        fetchSolarTimes(la, lo);
                    }, () => setIsLoadingLocation(false));
                }
            };

            return (
                <div className="min-h-screen bg-stone-100 text-stone-800 font-sans pb-10">
                    <header className="bg-emerald-900 text-white p-6 shadow-md rounded-b-3xl relative">
                        <button onClick={() => setLang(lang === 'nl' ? 'en' : 'nl')} className="absolute top-6 right-6 bg-white/10 p-2 rounded-full border border-white/20 transition-all active:scale-95"><Globe size={18} /></button>
                        <div className="max-w-md mx-auto">
                            <h1 className="text-2xl font-bold flex items-center gap-2 tracking-tight"><Anchor size={24} className="text-emerald-400" /> {t.title}</h1>
                            <p className="text-stone-300 text-xs mt-1 font-light">{t.subtitle}</p>
                        </div>
                    </header>
                    <main className="max-w-md mx-auto px-4 mt-6 space-y-6">
                        <section className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <h2 className="text-lg font-medium flex items-center gap-2 mb-4"><Navigation size={20} className="text-emerald-700" /> {t.navTitle}</h2>
                            <div className="space-y-3 mb-4">
                                <div className="flex items-center gap-2 bg-stone-50 p-2 rounded-lg border border-stone-100">
                                    <span className="text-[10px] font-bold w-8 text-stone-400">LAT</span>
                                    <input type="number" value={latDeg} onChange={e=>setLatDeg(e.target.value)} className="w-12 p-1 text-center bg-transparent border-b border-stone-200 focus:border-emerald-500 outline-none" />°
                                    <input type="number" value={latMin} onChange={e=>setLatMin(e.target.value)} className="w-16 p-1 text-center bg-transparent border-b border-stone-200 focus:border-emerald-500 outline-none" />'
                                    <select value={latDir} onChange={e=>setLatDir(e.target.value)} className="bg-transparent font-bold text-emerald-800"><option>N</option><option>S</option></select>
                                </div>
                                <div className="flex items-center gap-2 bg-stone-50 p-2 rounded-lg border border-stone-100">
                                    <span className="text-[10px] font-bold w-8 text-stone-400">LNG</span>
                                    <input type="number" value={lngDeg} onChange={e=>setLngDeg(e.target.value)} className="w-12 p-1 text-center bg-transparent border-b border-stone-200 focus:border-emerald-500 outline-none" />°
                                    <input type="number" value={lngMin} onChange={e=>setLngMin(e.target.value)} className="w-16 p-1 text-center bg-transparent border-b border-stone-200 focus:border-emerald-500 outline-none" />'
                                    <select value={lngDir} onChange={e=>setLngDir(e.target.value)} className="bg-transparent font-bold text-emerald-800"><option>E</option><option>W</option></select>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={getGPS} className="flex-1 bg-stone-100 text-stone-700 py-3 rounded-xl font-bold border border-stone-200 active:bg-stone-200 transition-colors">GPS</button>
                                <button onClick={handleManualCalculate} className="flex-[2] bg-emerald-700 text-white py-3 rounded-xl font-bold shadow-md active:bg-emerald-800 transition-colors">{isLoadingLocation ? <Loader2 className="animate-spin mx-auto"/> : t.btnCalc}</button>
                            </div>
                        </section>
                        
                        <section className="bg-emerald-50 p-6 rounded-2xl border border-emerald-100 text-center shadow-inner relative overflow-hidden">
                             <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none">
                                {nextEvent === 'Iftar' ? <Sun size={120} /> : <Moon size={120} />}
                            </div>
                            <h2 className="text-xs font-bold text-emerald-800 uppercase tracking-widest mb-2 relative z-10">{nextEvent === 'Fajr' ? t.timeTillFajr : t.timeTillIftar}</h2>
                            <p className="text-5xl font-light tabular-nums tracking-tighter text-stone-900 relative z-10">{countdown}</p>
                            {!solarDates && <p className="text-[10px] mt-2 text-stone-400">{t.waitingForLoc}</p>}
                        </section>

                        {solarTimes && (
                            <section className="bg-white p-4 rounded-2xl border border-stone-200 shadow-sm overflow-hidden">
                                <div className="grid grid-cols-6 gap-0.5 text-center">
                                    <div className="bg-emerald-50 py-2 rounded-l-lg border-r border-white">
                                        <p className="text-[7px] font-bold text-emerald-800 uppercase">{t.fajr}</p>
                                        <p className="text-[11px] font-bold text-stone-800">{solarTimes.fajr}</p>
                                    </div>
                                    <div className="bg-stone-50 py-2 border-r border-white">
                                        <p className="text-[7px] font-bold text-stone-400 uppercase">{t.sunrise}</p>
                                        <p className="text-[11px] font-medium text-stone-600 italic">{solarTimes.sunrise}</p>
                                    </div>
                                    <div className="bg-stone-50 py-2 border-r border-white">
                                        <p className="text-[7px] font-bold text-stone-400 uppercase">{t.dhuhr}</p>
                                        <p className="text-[11px] font-medium text-stone-700">{solarTimes.dhuhr}</p>
                                    </div>
                                    <div className="bg-stone-50 py-2 border-r border-white">
                                        <p className="text-[7px] font-bold text-stone-400 uppercase">{t.asr}</p>
                                        <p className="text-[11px] font-medium text-stone-700">{solarTimes.asr}</p>
                                    </div>
                                    <div className="bg-emerald-50 py-2 border-r border-white">
                                        <p className="text-[7px] font-bold text-emerald-800 uppercase">{t.maghrib}</p>
                                        <p className="text-[11px] font-bold text-stone-800">{solarTimes.maghrib}</p>
                                    </div>
                                    <div className="bg-stone-50 py-2 rounded-r-lg">
                                        <p className="text-[7px] font-bold text-stone-400 uppercase">{t.isha}</p>
                                        <p className="text-[11px] font-medium text-stone-700">{solarTimes.isha}</p>
                                    </div>
                                </div>
                                <p className="text-[8px] text-stone-400 mt-3 text-center italic">{t.legend}</p>
                            </section>
                        )}

                        <section className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                             <div className="flex justify-between items-center mb-4">
                                <h2 className="font-medium flex items-center gap-2"><BookOpen size={18} className="text-emerald-700"/>{t.refTitle}</h2>
                                <button onClick={()=>setJournalText(prev => prev + (prev ? '\n\n' : '') + humanistPrompts[lang][Math.floor(Math.random()*5)])} className="text-emerald-700 bg-emerald-50 px-3 py-1 rounded-full text-[10px] flex items-center gap-1 border border-emerald-100 transition-all hover:bg-emerald-100"><Sparkles size={12}/> {t.btnPrompt}</button>
                            </div>
                             <textarea value={journalText} onChange={e=>setJournalText(e.target.value)} className="w-full h-24 p-3 border border-stone-200 rounded-xl text-sm mb-2 focus:ring-1 focus:ring-emerald-500 outline-none shadow-inner" placeholder={t.refPlaceholder}></textarea>
                             <button onClick={() => {
                                 if (!journalText.trim()) return;
                                 setEntries([{ id: Date.now(), text: journalText, date: new Date().toLocaleDateString(lang, { day: 'numeric', month: 'short' }), time: new Date().toLocaleTimeString(lang, { hour: '2-digit', minute: '2-digit' }) }, ...entries]);
                                 setJournalText('');
                             }} className="w-full bg-emerald-800 text-white py-2 rounded-lg text-sm shadow-sm font-medium hover:bg-emerald-900 transition-colors">Opslaan</button>
                        </section>

                        <div className="space-y-3">
                            {entries.map(e=>(<div key={e.id} className="bg-white p-4 rounded-xl border border-stone-200 relative shadow-sm group animate-in fade-in slide-in-from-bottom-2">
                                <span className="text-[9px] text-emerald-700 font-bold uppercase tracking-wider">{e.date} • {e.time}</span>
                                <p className="text-sm mt-1 leading-relaxed text-stone-700">{e.text}</p>
                                <button onClick={()=>setEntries(entries.filter(i=>i.id!==e.id))} className="absolute top-4 right-4 text-stone-300 hover:text-red-400 transition-colors opacity-0 group-hover:opacity-100"><Trash2 size={14}/></button>
                            </div>))}
                        </div>
                        <footer className="text-center py-4"><p className="text-[10px] text-stone-400 font-medium uppercase tracking-widest">{t.copyright}</p></footer>
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => console.log('SW OK'), err => console.log('SW Error', err));
            });
        }
    </script>
</body>
</html>
