<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#064e3b">
    <title>Islam at sea</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-stone-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Iconen ---
        const Icon = ({ children, size = 24, className = "", ...rest }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...rest}>
                {children}
            </svg>
        );
        const Sun = (p) => <Icon {...p}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></Icon>;
        const Moon = (p) => <Icon {...p}><path d="M12 3a6.364 6.364 0 0 0 9 9 9 9 0 1 1-9-9Z"/></Icon>;
        const BookOpen = (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
        const Navigation = (p) => <Icon {...p}><polygon points="3 11 22 2 13 21 11 13 3 11"/></Icon>;
        const Anchor = (p) => <Icon {...p}><circle cx="12" cy="5" r="3"/><line x1="12" x2="12" y1="8" y2="22"/><line x1="5" x2="19" y1="12" y2="12"/><path d="M5 12c0 3.866 3.134 7 7 7s7-3.134 7-7"/></Icon>;
        const Loader2 = (p) => <Icon {...p}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Icon>;
        const Globe = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></Icon>;
        const Trash2 = (p) => <Icon {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></Icon>;
        const Sparkles = (p) => <Icon {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></Icon>;
        const InfoCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Icon>;
        const XIcon = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;

        const translations = {
            nl: {
                title: "Islam at sea",
                subtitle: "Gebedstijden & Bezinning op volle zee.",
                navTitle: "Positie & Berekening",
                btnGPS: "Actief",
                btnGPSOff: "GPS",
                btnCalc: "Bereken",
                fajr: "Fajr", sunrise: "Opkomst", dhuhr: "Dhuhr", asr: "Asr", maghrib: "Maghrib", isha: "Isha",
                timeTillFajr: "Tijd tot Fajr", timeTillMaghrib: "Tijd tot Maghrib",
                waitingForLoc: "Geef een locatie op of activeer GPS...",
                refTitle: "Notities & Intenties",
                refPlaceholder: "Schrijf hier je gedachten...",
                btnPrompt: "Suggestie",
                copyright: "© 2026 Islam at sea",
                legendLive: "• Tijden gecorrigeerd voor DR koers en vaart.",
                legendFallback: "* Tijd aangepast via maritieme veiligheidsmarge (witte nachten).",
                infoTitle: "Hoe worden de tijden berekend?",
                infoBaseTitle: "1. Astronomische Basis",
                infoBase: "De tijden worden primair berekend op basis van de exacte hoek van de zon ten opzichte van de horizon op jouw huidige GPS-positie.",
                infoDRTitle: "2. Dead Reckoning (Koers & Vaart)",
                infoDR: "Als het schip vaart (SOG > 2 kts), berekent de app continu waar je je zult bevinden op het moment van zonsondergang. De tijd wordt gecorrigeerd voor deze toekomstige positie.",
                infoHighLatTitle: "3. Hoge Breedtegraden (Witte Nachten)",
                infoHighLat: "Op noordelijke breedtes (vaak > 50°N) wordt het in de zomer niet volledig donker. De app detecteert dit en schakelt veilig over op de maritieme '90-minuten regel' (Fajr is 90 min voor zonsopkomst, Isha is 90 min na zonsondergang). Dit wordt in de tabel gemarkeerd met een *.",
                btnClose: "Begrepen"
            },
            en: {
                title: "Islam at sea",
                subtitle: "Prayer times & reflection at sea.",
                navTitle: "Position & Calculation",
                btnGPS: "Active",
                btnGPSOff: "GPS",
                btnCalc: "Calc",
                fajr: "Fajr", sunrise: "Sunrise", dhuhr: "Dhuhr", asr: "Asr", maghrib: "Maghrib", isha: "Isha",
                timeTillFajr: "Time till Fajr", timeTillMaghrib: "Time till Maghrib",
                waitingForLoc: "Enter a location or activate GPS...",
                refTitle: "Notes & Intentions",
                refPlaceholder: "Write your thoughts...",
                btnPrompt: "Suggestion",
                copyright: "© 2026 Islam at sea",
                legendLive: "• Times corrected for DR course and speed.",
                legendFallback: "* Time adjusted via maritime safety margin (white nights).",
                infoTitle: "How are the times calculated?",
                infoBaseTitle: "1. Astronomical Base",
                infoBase: "Times are primarily calculated based on the exact angle of the sun relative to the horizon at your current GPS position.",
                infoDRTitle: "2. Dead Reckoning (Course & Speed)",
                infoDR: "If the ship is making way (SOG > 2 kts), the app continuously calculates where you will be at sunset. The time is corrected for this projected future position.",
                infoHighLatTitle: "3. High Latitudes (White Nights)",
                infoHighLat: "At northern latitudes (often > 50°N), it doesn't get completely dark in summer. The app detects this and safely switches to the maritime '90-minute rule' (Fajr is 90 mins before sunrise, Isha is 90 mins after sunset). This is marked in the table with an *.",
                btnClose: "Understood"
            }
        };

        const humanistPrompts = {
            nl: ["Waar ben ik vandaag dankbaar voor?", "Welke intentie zet ik vandaag?", "De zee is geduldig, hoe kan ik dat ook zijn?", "Wat wens ik de mensen thuis toe?", "Wat leer ik van de stilte?"],
            en: ["What am I grateful for today?", "What intention am I setting?", "The sea is patient, how can I be too?", "What do I wish for loved ones?", "What does silence teach me?"]
        };

        function App() {
            const getDeviceLang = () => (navigator.language || 'en').startsWith('nl') ? 'nl' : 'en';
            const [lang, setLang] = useState(() => localStorage.getItem('appLang') || getDeviceLang());
            const t = translations[lang];
            
            const [journalText, setJournalText] = useState('');
            const [entries, setEntries] = useState(() => JSON.parse(localStorage.getItem('ramadanEntries') || '[]'));

            const [solarDates, setSolarDates] = useState(null);
            const [countdown, setCountdown] = useState('--:--:--');
            const [nextEvent, setNextEvent] = useState('');
            
            const [showInfo, setShowInfo] = useState(false);
            const [fallbackApplied, setFallbackApplied] = useState({ fajr: false, isha: false });

            const [latDeg, setLatDeg] = useState(() => localStorage.getItem('latDeg') || '');
            const [latMin, setLatMin] = useState(() => localStorage.getItem('latMin') || '');
            const [latDir, setLatDir] = useState(() => localStorage.getItem('latDir') || 'N');
            const [lngDeg, setLngDeg] = useState(() => localStorage.getItem('lngDeg') || '');
            const [lngMin, setLngMin] = useState(() => localStorage.getItem('lngMin') || '');
            const [lngDir, setLngDir] = useState(() => localStorage.getItem('lngDir') || 'E');
            
            const [solarTimes, setSolarTimes] = useState(null);
            const [isLoadingLocation, setIsLoadingLocation] = useState(false);
            const [isGpsActive, setIsGpsActive] = useState(false);
            const [velocity, setVelocity] = useState({ speed: 0, course: 0 });
            const [gpsHistory, setGpsHistory] = useState([]);
            
            const lastFetchRef = useRef(0);
            const watchIdRef = useRef(null);

            useEffect(() => { localStorage.setItem('appLang', lang); }, [lang]);
            useEffect(() => { localStorage.setItem('ramadanEntries', JSON.stringify(entries)); }, [entries]);
            useEffect(() => {
                localStorage.setItem('latDeg', latDeg); localStorage.setItem('latMin', latMin); localStorage.setItem('latDir', latDir);
                localStorage.setItem('lngDeg', lngDeg); localStorage.setItem('lngMin', lngMin); localStorage.setItem('lngDir', lngDir);
            }, [latDeg, latMin, latDir, lngDeg, lngMin, lngDir]);

            useEffect(() => {
                let interval;
                if (solarDates) {
                    const updateTimer = () => {
                        const now = new Date();
                        let target, eventName;
                        if (now < solarDates.fajr) { target = solarDates.fajr; eventName = 'Fajr'; }
                        else if (now < solarDates.iftar) { target = solarDates.iftar; eventName = 'Maghrib'; }
                        else { target = new Date(solarDates.fajr.getTime() + 86400000); eventName = 'Fajr'; }
                        const diff = target - now;
                        const h = Math.floor(diff / 3600000);
                        const m = Math.floor((diff % 3600000) / 60000);
                        const s = Math.floor((diff % 60000) / 1000);
                        setCountdown(`${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`);
                        setNextEvent(eventName);
                    };
                    updateTimer(); interval = setInterval(updateTimer, 1000);
                }
                return () => clearInterval(interval);
            }, [solarDates]);

            const fetchSolarTimes = async (latitude, longitude, speedKts = 0, course = 0) => {
                const now = Date.now();
                if (now - lastFetchRef.current < 60000 && isGpsActive) return; 
                lastFetchRef.current = now;

                setIsLoadingLocation(true);
                try {
                    const res = await fetch(`https://api.sunrise-sunset.org/json?lat=${latitude}&lng=${longitude}&formatted=0`);
                    const data = await res.json();
                    
                    if (data.status === 'OK') {
                        let results = data.results;

                        if (speedKts > 2) {
                            const currentIftar = new Date(results.sunset);
                            const timeToIftarHours = (currentIftar - new Date()) / 3600000;

                            if (timeToIftarHours > 0 && timeToIftarHours < 12) {
                                const dist = speedKts * timeToIftarHours;
                                const dLat = (dist * Math.cos(course * Math.PI / 180)) / 60;
                                const dLng = (dist * Math.sin(course * Math.PI / 180)) / (60 * Math.cos(latitude * Math.PI / 180));
                                
                                const futureLat = latitude + dLat;
                                const futureLng = longitude + dLng;

                                const resFuture = await fetch(`https://api.sunrise-sunset.org/json?lat=${futureLat}&lng=${futureLng}&formatted=0`);
                                const dataFuture = await resFuture.json();
                                if (dataFuture.status === 'OK') {
                                    results = dataFuture.results; 
                                }
                            }
                        }

                        let dawn = new Date(results.astronomical_twilight_begin);
                        let rise = new Date(results.sunrise);
                        let dhuhr = new Date(results.solar_noon);
                        let sunset = new Date(results.sunset);
                        let isha = new Date(results.astronomical_twilight_end);

                        const isInvalid = (d) => isNaN(d.getTime()) || d.getFullYear() === 1970;
                        let isFajrFallback = false;
                        let isIshaFallback = false;

                        if (isInvalid(rise) || isInvalid(sunset)) {
                            rise = new Date(dhuhr.getTime() - 6 * 3600000);
                            sunset = new Date(dhuhr.getTime() + 6 * 3600000);
                            isFajrFallback = true;
                            isIshaFallback = true;
                        }

                        if (isInvalid(dawn) || dawn > rise) {
                            dawn = new Date(rise.getTime() - 90 * 60000);
                            isFajrFallback = true;
                        }
                        if (isInvalid(isha) || isha < sunset) {
                            isha = new Date(sunset.getTime() + 90 * 60000);
                            isIshaFallback = true;
                        }

                        setFallbackApplied({ fajr: isFajrFallback, isha: isIshaFallback });

                        const asr = new Date(dhuhr.getTime() + (sunset.getTime() - dhuhr.getTime()) * 0.55);

                        setSolarDates({ fajr: dawn, iftar: sunset });
                        const opts = { hour: '2-digit', minute: '2-digit' };
                        setSolarTimes({
                            fajr: dawn.toLocaleTimeString([], opts),
                            sunrise: rise.toLocaleTimeString([], opts),
                            dhuhr: dhuhr.toLocaleTimeString([], opts),
                            asr: asr.toLocaleTimeString([], opts),
                            maghrib: sunset.toLocaleTimeString([], opts),
                            isha: isha.toLocaleTimeString([], opts)
                        });
                    }
                } catch (e) { console.error(e); }
                setIsLoadingLocation(false);
            };

            const handleManualCalculate = () => {
                if (latDeg && latMin && lngDeg && lngMin) {
                    let lat = parseInt(latDeg) + (parseFloat(latMin) / 60); if (latDir === 'S') lat = -lat;
                    let lng = parseInt(lngDeg) + (parseFloat(lngMin) / 60); if (lngDir === 'W') lng = -lng;
                    lastFetchRef.current = 0; 
                    fetchSolarTimes(lat, lng, 0, 0);
                }
            };

            useEffect(() => { if (latDeg && lngDeg && !isGpsActive) handleManualCalculate(); }, []);

            const toggleGps = () => {
                if (isGpsActive) {
                    if (watchIdRef.current) navigator.geolocation.clearWatch(watchIdRef.current);
                    setIsGpsActive(false);
                    setVelocity({ speed: 0, course: 0 });
                    setGpsHistory([]);
                } else {
                    if (navigator.geolocation) {
                        setIsGpsActive(true);
                        setIsLoadingLocation(true);
                        watchIdRef.current = navigator.geolocation.watchPosition((p) => {
                            const la = p.coords.latitude; 
                            const lo = p.coords.longitude;
                            const sog = p.coords.speed ? p.coords.speed * 1.94384 : 0;
                            const cog = p.coords.heading || 0;

                            setLatDeg(Math.floor(Math.abs(la))); 
                            setLatMin(((Math.abs(la) % 1) * 60).toFixed(2)); 
                            setLatDir(la >= 0 ? 'N' : 'S');
                            setLngDeg(Math.floor(Math.abs(lo))); 
                            setLngMin(((Math.abs(lo) % 1) * 60).toFixed(2)); 
                            setLngDir(lo >= 0 ? 'E' : 'W');

                            const now = Date.now();
                            setGpsHistory(prev => {
                                const newHistory = [...prev, { lat: la, lng: lo, speed: sog, course: cog, t: now }]
                                    .filter(item => now - item.t < 20000);
                                
                                let avgSog = sog;
                                let avgCog = cog;

                                if (newHistory.length > 0) {
                                    avgSog = newHistory.reduce((a, b) => a + b.speed, 0) / newHistory.length;
                                    avgCog = newHistory.reduce((a, b) => a + b.course, 0) / newHistory.length;
                                    setVelocity({ speed: avgSog, course: avgCog });
                                }
                                
                                fetchSolarTimes(la, lo, avgSog, avgCog);
                                
                                return newHistory;
                            });
                        }, (err) => {
                            console.error(err);
                            setIsGpsActive(false);
                            setIsLoadingLocation(false);
                        }, {
                            enableHighAccuracy: true,
                            maximumAge: 0
                        });
                    }
                }
            };

            useEffect(() => {
                return () => {
                    if (watchIdRef.current) navigator.geolocation.clearWatch(watchIdRef.current);
                };
            }, []);

            return (
                <div className="min-h-screen bg-stone-100 text-stone-800 font-sans pb-10">
                    {showInfo && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-stone-900/60 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden">
                                <div className="bg-emerald-900 p-4 flex justify-between items-center text-white">
                                    <h3 className="font-bold flex items-center gap-2"><InfoCircle size={18} /> {t.infoTitle}</h3>
                                    <button onClick={() => setShowInfo(false)} className="bg-white/10 p-1.5 rounded-full hover:bg-white/20 transition"><XIcon size={16} /></button>
                                </div>
                                <div className="p-5 space-y-4 text-sm text-stone-700">
                                    <div>
                                        <h4 className="font-bold text-emerald-800">{t.infoBaseTitle}</h4>
                                        <p className="mt-1 leading-relaxed">{t.infoBase}</p>
                                    </div>
                                    <div className="border-t border-stone-100 pt-3">
                                        <h4 className="font-bold text-emerald-800">{t.infoDRTitle}</h4>
                                        <p className="mt-1 leading-relaxed">{t.infoDR}</p>
                                    </div>
                                    <div className="border-t border-stone-100 pt-3">
                                        <h4 className="font-bold text-emerald-800">{t.infoHighLatTitle}</h4>
                                        <p className="mt-1 leading-relaxed">{t.infoHighLat}</p>
                                    </div>
                                    <button onClick={() => setShowInfo(false)} className="w-full mt-4 bg-stone-100 text-stone-800 py-2.5 rounded-lg font-bold hover:bg-stone-200 transition">{t.btnClose}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="bg-emerald-900 text-white p-6 shadow-md rounded-b-3xl relative">
                        <div className="absolute top-6 right-6 flex gap-2">
                            <button onClick={() => setShowInfo(true)} className="bg-white/10 p-2 rounded-full border border-white/20 transition-all active:scale-95"><InfoCircle size={18} /></button>
                            <button onClick={() => setLang(lang === 'nl' ? 'en' : 'nl')} className="bg-white/10 p-2 rounded-full border border-white/20 transition-all active:scale-95"><Globe size={18} /></button>
                        </div>
                        
                        <div className="max-w-md mx-auto pr-16">
                            <h1 className="text-2xl font-bold flex items-center gap-2 tracking-tight"><Anchor size={24} className="text-emerald-400" /> {t.title}</h1>
                            <p className="text-stone-300 text-xs mt-1 font-light">{t.subtitle}</p>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto px-4 mt-6 space-y-6">
                        <section className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <h2 className="text-lg font-medium flex items-center gap-2 mb-4"><Navigation size={20} className="text-emerald-700" /> {t.navTitle}</h2>
                            
                            <div className="space-y-3 mb-2">
                                <div className="flex items-center gap-2 bg-stone-50 p-2 rounded-lg border border-stone-100">
                                    <span className="text-[10px] font-bold w-8 text-stone-400">LAT</span>
                                    <input type="number" value={latDeg} onChange={e=>setLatDeg(e.target.value)} disabled={isGpsActive} className="w-12 p-1 text-center bg-transparent border-b border-stone-200 outline-none disabled:opacity-50" />°
                                    <input type="number" value={latMin} onChange={e=>setLatMin(e.target.value)} disabled={isGpsActive} className="w-16 p-1 text-center bg-transparent border-b border-stone-200 outline-none disabled:opacity-50" />'
                                    <select value={latDir} onChange={e=>setLatDir(e.target.value)} disabled={isGpsActive} className="bg-transparent font-bold text-emerald-800"><option>N</option><option>S</option></select>
                                </div>
                                <div className="flex items-center gap-2 bg-stone-50 p-2 rounded-lg border border-stone-100">
                                    <span className="text-[10px] font-bold w-8 text-stone-400">LNG</span>
                                    <input type="number" value={lngDeg} onChange={e=>setLngDeg(e.target.value)} disabled={isGpsActive} className="w-12 p-1 text-center bg-transparent border-b border-stone-200 outline-none disabled:opacity-50" />°
                                    <input type="number" value={lngMin} onChange={e=>setLngMin(e.target.value)} disabled={isGpsActive} className="w-16 p-1 text-center bg-transparent border-b border-stone-200 outline-none disabled:opacity-50" />'
                                    <select value={lngDir} onChange={e=>setLngDir(e.target.value)} disabled={isGpsActive} className="bg-transparent font-bold text-emerald-800"><option>E</option><option>W</option></select>
                                </div>
                            </div>

                            <div className={`flex justify-between px-2 text-[10px] font-mono mb-4 transition-opacity ${isGpsActive ? 'text-emerald-700' : 'text-stone-300 opacity-0'}`}>
                                <span>SOG: {velocity.speed.toFixed(1)} kts</span>
                                <span className="flex items-center gap-1"><span className="animate-pulse text-emerald-500">●</span> Live GPS</span>
                                <span>COG: {Math.round(velocity.course)}°</span>
                            </div>

                            <div className="flex gap-2">
                                <button onClick={toggleGps} className={`flex-1 py-3 rounded-xl font-bold border transition-colors ${isGpsActive ? 'bg-emerald-100 text-emerald-800 border-emerald-300' : 'bg-stone-100 text-stone-700 border-stone-200'}`}>
                                    {isGpsActive ? t.btnGPS : t.btnGPSOff}
                                </button>
                                <button onClick={handleManualCalculate} disabled={isGpsActive} className="flex-[2] bg-emerald-700 text-white py-3 rounded-xl font-bold shadow-md disabled:bg-stone-300">
                                    {isLoadingLocation && !isGpsActive ? <Loader2 className="animate-spin mx-auto"/> : t.btnCalc}
                                </button>
                            </div>
                        </section>
                        
                        <section className="bg-emerald-50 p-6 rounded-2xl border border-emerald-100 text-center shadow-inner relative overflow-hidden">
                             <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none">
                                {nextEvent === 'Maghrib' ? <Sun size={120} /> : <Moon size={120} />}
                            </div>
                            <h2 className="text-xs font-bold text-emerald-800 uppercase tracking-widest mb-2 relative z-10">{nextEvent === 'Fajr' ? t.timeTillFajr : t.timeTillMaghrib}</h2>
                            <p className="text-5xl font-light tabular-nums tracking-tighter text-stone-900 relative z-10">{countdown}</p>
                            {!solarDates && <p className="text-[10px] mt-2 text-stone-400">{t.waitingForLoc}</p>}
                        </section>

                        {solarTimes && (
                            <section className="bg-white p-4 rounded-2xl border border-stone-200 shadow-sm overflow-hidden">
                                <div className="grid grid-cols-6 gap-0.5 text-center">
                                    <div className="bg-emerald-50 py-2 rounded-l-lg border-r border-white">
                                        <p className="text-[7px] font-bold text-emerald-800 uppercase">{t.fajr}</p>
                                        <p className="text-[11px] font-bold text-stone-800">{solarTimes.fajr}{fallbackApplied.fajr && <span className="text-amber-500 ml-0.5">*</span>}</p>
                                    </div>
                                    <div className="bg-stone-50 py-2 border-r border-white">
                                        <p className="text-[7px] font-bold text-stone-400 uppercase">{t.sunrise}</p>
                                        <p className="text-[11px] font-medium text-stone-600 italic">{solarTimes.sunrise}</p>
                                    </div>
                                    <div className="bg-stone-50 py-2 border-r border-white">
                                        <p className="text-[7px] font-bold text-stone-400 uppercase">{t.dhuhr}</p>
                                        <p className="text-[11px] font-medium text-stone-700">{solarTimes.dhuhr}</p>
                                    </div>
                                    <div className="bg-stone-50 py-2 border-r border-white">
                                        <p className="text-[7px] font-bold text-stone-400 uppercase">{t.asr}</p>
                                        <p className="text-[11px] font-medium text-stone-700">{solarTimes.asr}</p>
                                    </div>
                                    <div className="bg-emerald-50 py-2 border-r border-white">
                                        <p className="text-[7px] font-bold text-emerald-800 uppercase">{t.maghrib}</p>
                                        <p className="text-[11px] font-bold text-stone-800">{solarTimes.maghrib}</p>
                                    </div>
                                    <div className="bg-stone-50 py-2 rounded-r-lg">
                                        <p className="text-[7px] font-bold text-stone-400 uppercase">{t.isha}</p>
                                        <p className="text-[11px] font-medium text-stone-700">{solarTimes.isha}{fallbackApplied.isha && <span className="text-amber-500 ml-0.5">*</span>}</p>
                                    </div>
                                </div>
                                <div className="mt-3 text-center space-y-1">
                                    {isGpsActive && <p className="text-[8px] text-emerald-600 italic">{t.legendLive}</p>}
                                    {(fallbackApplied.fajr || fallbackApplied.isha) && <p className="text-[8px] text-amber-600 font-medium italic">{t.legendFallback}</p>}
                                </div>
                            </section>
                        )}

                        <section className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                             <div className="flex justify-between items-center mb-4">
                                <h2 className="font-medium flex items-center gap-2"><BookOpen size={18} className="text-emerald-700"/>{t.refTitle}</h2>
                                <button onClick={()=>setJournalText(prev => prev + (prev ? '\n\n' : '') + humanistPrompts[lang][Math.floor(Math.random()*5)])} className="text-emerald-700 bg-emerald-50 px-3 py-1 rounded-full text-[10px] flex items-center gap-1 border border-emerald-100 transition-all hover:bg-emerald-100"><Sparkles size={12}/> {t.btnPrompt}</button>
                            </div>
                             <textarea value={journalText} onChange={e=>setJournalText(e.target.value)} className="w-full h-24 p-3 border border-stone-200 rounded-xl text-sm mb-2 outline-none shadow-inner" placeholder={t.refPlaceholder}></textarea>
                             <button onClick={() => {
                                 if (!journalText.trim()) return;
                                 setEntries([{ id: Date.now(), text: journalText, date: new Date().toLocaleDateString(lang, { day: 'numeric', month: 'short' }), time: new Date().toLocaleTimeString(lang, { hour: '2-digit', minute: '2-digit' }) }, ...entries]);
                                 setJournalText('');
                             }} className="w-full bg-emerald-800 text-white py-2 rounded-lg text-sm font-medium hover:bg-emerald-900">Opslaan</button>
                        </section>

                        <div className="space-y-3">
                            {entries.map(e=>(<div key={e.id} className="bg-white p-4 rounded-xl border border-stone-200 relative shadow-sm group">
                                <span className="text-[9px] text-emerald-700 font-bold uppercase tracking-wider">{e.date} • {e.time}</span>
                                <p className="text-sm mt-1 leading-relaxed text-stone-700">{e.text}</p>
                                <button onClick={()=>setEntries(entries.filter(i=>i.id!==e.id))} className="absolute top-4 right-4 text-stone-300 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"><Trash2 size={14}/></button>
                            </div>))}
                        </div>
                        <footer className="text-center py-4"><p className="text-[10px] text-stone-400 font-medium uppercase tracking-widest">{t.copyright}</p></footer>
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
